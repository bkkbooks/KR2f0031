body:
  text: 兩河經略詔令奏議類二奏議之屬提要臣等謹案兩河經略四卷明潘季馴撰萬歷初河決高家堰淮揚高寶皆為巨浸季馴建議築隄疏淤論水勢之強弱復黃河之故道條上六事詔如議行書中所載皆其時相度南北兩河奏疏首冠以圖末附書一通不著所上者為何人書中有奉大司空之教親往閲視之語考是時工部尚書李幼滋始終主張其事殆即其人歟季馴先後總河務二十七年晚輯河防一覽其大旨在以隄束水以水刷沙卒以此奏功此集所載諸疏並規度形勢利弊分明足以見一時施工之次第與所作河防一覽均為有禆實用之言不但補史志之疏略備圖之考證已也乾隆四十六年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7c848031d0373af877ebe78701b36322b3458197b24e1c4cdec54431898b3c58
