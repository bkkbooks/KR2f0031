body:
  text: 兩河經略卷三明潘季馴撰遵奉明旨恭報續議工程以便查核疏為遵奉明旨恭報續議工程以便查核事該總理河漕右都御史潘季馴題前事據管理河道工部郎中佘毅中張譽主事陳瑛管河兵備水利營田等道參政龔大器遊季勳副使張純僉事朱東光史邦直會呈抄蒙總理河漕并漕撫衙門憲牌仰職等即查各工內有與原議不同工程會同類總開呈以憑覆核奏聞依蒙隨將各工逐一查勘除兩河分合及應築應塞工程俱與原議無異又堤工各髙濶丈尺各相度地形增減不等候通完之日册報外所有堤岸閘壩勢當小更難拘原議者委應裁酌用圖經久以淮北言之如南岸遙堤原議自靈璧縣張字鋪起至邳州果字鋪止共長玖拾捌里其張字鋪以上原因河岸甚髙故止議將元黃二鋪掃灣處所展築月堤長捌百伍拾丈今續勘得徐州三山頭起至靈璧縣張字鋪共伍拾餘里一帶河岸雖髙然先年遇有異常泛漲亦往往漫決若止展築元黃二鋪月堤尚有可虞相應一併接築遙堤計長玖千餘丈庶成全堤無復遺慮其元黃二鋪止築順水壩以遏水勢不必另行展築果字鋪以下原因縷堤頗逺故未議築遙堤續勘得果字鋪至李字鋪縷堤約肆里餘猶覺逼近仍應增築遙堤計長㭍百伍拾丈北岸遙堤內邳州谷山并匙頭灣二處俱有水溝瀦蓄積水合行疏泄今議各建函洞一座以便泄水桃源縣古城起至季太口止計陸拾里內原議滚水壩叁座巳經建完今嵗伏水漲溢之時甚賴其減泄之力但季太口至清河縣計伍拾餘里未議建壩恐水勢至此尚致漲溢勘得三義鎮地形原窪衆水所趨合增建滚水壩一座其長闊丈尺俱照前壩庶分殺之路既多則衝漫之患可免此淮北工程所當續議者也以淮南言之原議修復清江等閘今勘得通濟閘逼近淮河直受衝齧勢甚洶湧且閘設年久底樁朽爛加石太重不免坍卸相應改建于甘羅城東堅實之地仍改濬河口斜向西南使水勢紆回不至直射庶便啓閉前閘既巳改建則新莊閘距此不及一里難容多船而關鎖太促水勢湍急不易啓閉相應拆卸福興閘上距通濟閘計二拾里下距清江閘止五里逺近懸絶且亦因年久圯壞難以加石今議改建於夀州厰適中處所其清江一閘仍照原議修復至於板閘地窪水平無庸啓閉止須照舊免行增髙又勘得原議修復伍壩內信字壩逼近淮城且係黃河掃灣先年久廢不用今巳將禮智二壩修復見在車盤船隻其仁義二壩原共一口出船亦係黃河掃灣又與清江閘相鄰恐有意外衝漫之患見今築堤在上以禦黃流不便修復查得舊有天妃閘正與清河直對相應建壩一座於本閘之裏則車盤尤便而船隻無阻矣其興鹽等處入海支河原因髙堰未築黃浦八淺等決未塞水勢浩蕩故踵襲節年舊議欲加挑濬以泄積水近勘得髙堰築完黃浦八淺俱塞下流巳乾無水可泄而海口之水反髙於內地若復挑濬則海水灌入既傷民田復損鹽利正在勘議間隨該巡鹽御史薑璧躬親踏勘題請免濬復經司道會勘委應停止夫興鹽等處既以無水可泄免濬支河若寶應湖堤仍照原議於叄拾里之內添建減水閘六座又恐分流太多興鹽難受况建閘初意祗因上流水溢恐致傷堤今髙堰既築通濟閘外又經題準每年水漲之時築壩斷流則寶應湖水不甚盈溢湖堤可保無虞不必多建減閘今議修復舊閘二座創建二座通共四座庶運道民田俱有攸賴其開挑興鹽支河工費銀二萬五千八百七十六兩原議於巡鹽衙門動支運司銀兩仍聽該衙門作正支銷此淮南工程所當續議者也以上事宜皆因地損益隨時劑量期於有濟不敢執泥俱經會議僉同陸續呈請舉行訖今蒙行查理合類報轉奏施行等因到臣案照先準工部咨為奉明旨陳愚見議治兩河經略以圖永利事該臣等題議各項工程事宜本部覆題奉聖旨這治河事宜既經河漕諸臣會議停當依擬都準行著他們悉心著實興建永利各該經委分任人員如有玩愒推諉虛費財力者許不時拿問恭治其未盡事宜及臨時事勢或與原議不合的也著陸續奏聞務求有益應用錢糧爾部裏便會戶部上緊議來欽此備咨到臣俱經通行司道欽遵興舉間續據郎中佘毅中等議將各工增損事宜節次會呈前來又經臣等親閲相同批允舉行訖秖緣工程大體俱無更張止於節目微有不同事涉煩瑣未敢屑屑瀆奏兹當告成伊邇合行通查類報今據前因為照兩河大工延袤千里臣等荒度之初止詳於兩河分合大勢而隄岸閘壩之逺近多寡委須臨時再加勘酌仰荷我皇上坐照萬里洞燭事機假臣以便宜之權開臣以續奏之路所據司道陸續議報前來在淮北則有徐州三山頭起至張字鋪加築遙堤五十餘里元黃二鋪止建順水壩一道果字鋪起至李字鋪加築遙堤四里餘谷山匙頭灣添建函洞二座三義鎮添建滚水􅄵一座此皆原題未載委應增益在淮南則有通濟福興二閘從新改遷新莊逼近通濟閘勢難兩存板閘止宜仍舊信字壩逼近黃河不便修復仁義壩改建天妃閘以裏至於興鹽等處入海支河因髙堰黃浦八淺隄成無水可泄自宜停止而寶應湖堤減水閘止須修建四座此原題備載委當更易因時審勢隨地制宜臣等固不敢惜勞以貽一簣之虧亦不敢妄舉以滋無益之費其應添錢糧即於原請河工銀內通融裁節濟用並無求益加𣲖之事除將各堤工髙濶丈尺相度地形增減不等通候查核外緣係遵奉明旨恭報續議工程以便查核事理相應奏報謹具題知奉聖旨工部知道恭報兩河工成仰慰聖衷疏為恭報兩河工成仰慰聖衷事萬歷七年十月初六日據管河郎中佘毅中張譽主事陳瑛管河兵備營田等道參政龔大器遊季勳副使張純僉事朱東光史邦直會呈節奉總理河漕并總督漕撫衙門劄付俱為奉明旨陳愚見議治兩河經略以圖永利等事行職等將派定工程鳩夫辦料刻期興舉該職等遵依督率分委府州縣等官親詣工所照式率作俱自萬歷六年九月十五等日興工至今陸續通完訖總計築過土堤長一十萬二千二百六十八丈三尺一寸砌過石隄長三千三百七十四丈九尺塞過大小決口共一百三十九處建過減水石壩四座每座長三十丈修建過新舊閘三座車壩三座築過攔河順水等􅄵十道建過函洞二座減水閘四座濬過運河淤淺長一萬一千五百六十三丈五尺開過河渠二道栽過低栁八十三萬二千二百株其各隄髙卑酌量地形低昻隨宜增損自一丈二尺以至七八尺不等數目煩瑣聼候勘官至日另册開送核實外照得數年以來黃淮二河胥失故道至以地方州縣為壑蓋由黃河惟恃縷隄而縷隄逼近河濵束水太急每遇伏秋輒被衝決橫溢肆出一㵼千里莫之底極北岸則決崔鎮季太等處南岸則決龍窩周營等處共百餘口而又從小河口白洋河灌入挾永堌諸湖之水越歸仁集直射泗州陵寢以致正河流緩泥沙停滯河身墊髙淮水又因髙家堰年久圮壞潰決東奔破黃浦決八淺而山陽髙寶興鹽悉成沮洳清口將為平陸黃淮分流淤沙岡滌雲梯關入海之路坐此淺狹而運道民生俱病矣自去秋興工之後諸決盡塞水悉歸漕衝刷力專日就深廣今遙隄告竣自徐抵淮六百餘里兩隄相望基址既逺且皆真土膠泥夯杵堅實絶無往嵗雜沙虛鬆之弊蜿蟺綿亘殆如長山夾峙而河流於其中即使異常泛漲縷隄不支而溢至遙隄勢力淺緩容蓄寬舒必復歸漕不能潰出譬之重門待暴則暴必難侵增纊禦寒則寒必難入兼以歸仁一隄橫截于宿桃南岸要害之區使黃水不得南決泗洲至于桃清北岸又有減水四壩以節宣盈溢之水不令傷隄故在遙隄之內則運渠可無淺阻在遙堤之外則民田可免淹沒雖不能保河水之不溢而能保其必不奪河固不能保縷隄之無虞而能保其至遙即止蓋嘗考𢎞治以前張秋數塞數決自先任都御史劉大夏將黃陵岡一帶增築太行堤一道而張秋之患遂息此其巳試之明驗也今職等所築之遙隄即太行隄之別名耳况係真正淤土較之太行雜沙又有不侔者故今嵗伏初驟漲桃清一帶水為遙堤所束稍落即歸正漕沙隨水刷河身愈深河岸愈峻前嵗桃清之河膠不可楫今深且不測而兩岸迥然髙矣上流如呂梁兩崖俱露巉石波流湍急漸復舊洪徐邳一帶年來篙探及底者今測之皆深七八丈兩岸居民無復昔年蕩析播遷之苦此黃水復其故道之效也髙家堰屹然如城堅固足恃今淮水涓滴盡趨清口會黃入海清口日深上流日涸故不特堰內之地可耕而堰外湖坡漸成赤地蓋堰外原係民田田之外為湖湖之外為淮向皆混為一壑而今始復其本體矣其髙寶一帶因上流俱巳築塞湖水不至漲滿且寶應石堤新砌堅緻故雖秋間霖潦浹旬隄俱如故黃浦八淺築塞之後俱各無虞栁浦灣一帶新隄環抱淮城並無齧損不特髙寶田地得以耕藝而上自虹泗盱眙下及山陽興鹽等處皆成沃壤此淮水復其故道之效也見今淮城以西清河以東二瀆交流儼若涇渭誠所謂同為逆河以入於海矣海口之深測之巳十餘丈蓋借水攻水以河治河黃淮並注水滌沙行無復壅滯非特不相為扼而且交相為用故當秋漲之日而其景象如此昔年沙墊河淺水溢地上秪見其多今則沙刷河深水由地中秪見其少地方士民皆謂二十年來所曠見也此蓋仰仗我皇上聖德格天神明協相聖心獨斷廟算堅持是以本院部得行初志職等得效胼胝向使少為異議所搖則此時不知更作何狀矣今財力不多費而功遍於兩河時日不久曠而效收於期月數千里魚鱉之民一旦登于袵席億萬年命脈之路一旦底于翕寧職等幸獲遭逢曷勝慶幸除各用過錢糧另行册報外所據完過工程擬合開坐呈報施行等因到臣據此案查萬歷六年五月十五日該臣欽奉勑諭都察院右都御史兼工部左侍郎潘季馴近年河淮泛濫為害運道梗塞民不安居朕甚憂之巳屢有旨責之地方官經理奈無實心任事之臣動以工費艱巨為解又當事諸臣意見不同事多掣肘以致日久無功今特命爾前去督理河漕事務將河道都御史暫行裁革以其事專屬于爾其南北直𨽻山東河南地方有與河道相干者就令各該巡撫官照地分管俱聽爾提督爾宜親歷河流所經會同各巡撫官督同各部屬司道等官悉心協慮講求致害之因博采平治之䇿備查草灣口何為既開復淤及今作何開通全淮水何為南徙不復及今作何疏導徐邳河身髙並州城何以疏之使平黃浦崔鎮等口久塞無功何以築之使固及查諸臣歷年建議有行奏疏逐一勘議要見老黃河故道應否開復清桃正河應否挑濬髙家堰寶應隄應否修築小浮橋新衝口可否濟運應否加挑又徐邳以上地形南昻北下恐隄防一潰勢必奔流北徙將為閘河之梗亦要審其孰為正河孰為支河孰為合河或正而當厚其防或支而當殺其勢或合而當分其流一併勘議詳妥奏聞區處合用錢糧及選任司道等官俱許以便宜奏請給發委用功成之日通將效勞官員一體分別升賞如有抗違不服及推諉誤事者文官五品以下武官四品以下徑自提問應奏請者奏請定奪其提督軍務事宜查照河道衙門原管行事爾候事寧之日奏請回京朝廷以爾諳習河道素有才望特兹重任爾尚殫忠籌慮盡力區畫俾河漕無梗塞之虞人民免昏墊之苦必有懋賞以酬爾功毋或畏難憚勞隱忠不效及茍且塞責有負委任爾其勉之慎之故諭欽此臣遵奉綸音會同撫臣躬率司道等官沿河荒度周咨分合之勢博求治平之謀羣䇿畢集衆論僉同隨題為奉明旨陳愚見議治兩河經略以圖永利事該工部覆看得都御史潘季馴侍郎江一麟足遍口訊僉議詳酌為是六説其所修置寢格俱目擊利害而非道聽之言庶同則繹而非弗詢之謀蓋隄防既固塞決又審水無旁駛而正流自急沙隨水刷而海口自復此正以水治水而不為穿鑿之論迂謾之談頃來治河之説未有逾於二臣之議等因題聖旨這治河事宜既經河漕諸臣會議停當依擬都準行著他們悉心著實興建永利各該經委分任人員如有玩愒推諉虛費財力者許不時拿問參治其未盡事宜及臨時事勢或與原議不合的也著陸續奏聞務求有益應用錢糧儞部裏便會戶部上緊議來欽此備咨臣等欽遵查照興舉施行準此又該臣等題為勘估兩河工程乞賜早請錢糧以便興舉事欵議分督徐州北岸自呂梁洪至邳州直河止遙隄該海防道參政龔大器總管自桃源古城以下遙隄并塞界內決口及建減水壩一座又先分馬厰坡遙隄該中河郎中佘毅中總管自桃源縣界至清河縣北遙堤并塞界內決口及建減水壩一座該添注管河道副使張純總管自徐州南岸并靈睢界內遙隄及建減水壩一座該徐州道副使林紹總管睢寧界內遙隄并築歸仁集隄該頴州道僉事朱東光總管修復淮安運河各閘修築裏河兩隄并新城北一帶幫築新舊隄及塞黃浦口催濬興鹽支河該水利道僉事楊化總管築髙家堰塞天妃閘朱家口開復通濟閘修築趙家口迤西隄岸修復各壩該添注管河郎中張譽總管修築寶應一帶土石隄并建減水閘及挑濬揚州至儀真一帶河道該南河郎中施天麟總管等因本部覆奉欽依咨行臣等分工間郎中施天麟降調將原分寶應隄工改委營田道僉事史邦直揚州挑淺改委該府知府虞德煜僉事楊化罷黜將原分清江浦兩岸築隄改委主事陳瑛增修閘座改委淮安府知府宋伯華各管理栁浦灣修築新舊隄并添寶應八淺決工增委今補水利道副使張純黃浦口決工增委今補南河郎中張譽各兼理副使林紹間住原分一工該今任參政遊季勳管理俱於上年九月十五日起土興工臣等具本題知訖又該臣等查得司道續報工程淮北有徐州三山頭起至張字鋪增築遙隄元黃二鋪止建順水壩一道果字鋪起至李字鋪增築遙隄谷山匙頭灣添建函洞二座三義鎮添建減水壩一座此皆原題未載續議增益淮南有通濟福興二閘從新改遷新莊逼近通濟閘勢難兩存板閘止宜仍舊信字壩逼近黃河不便修復仁義壩改建天妃閘裏興鹽等處支河因髙堰黃浦八淺隄成無水可泄自宜停止寶應湖隄減水閘止須修建四座此原題備載續議更易又經具本題知訖臣等向在催督各工去後今據前因除將報到工程逐一查核相同外該臣會同漕運巡撫侍郎江一麟竊照我朝建都燕冀轉輸運道實為咽喉自儀真至淮安則資淮河之水自清河至徐州則資黃河之水黃河自西而來淮河自南而來合流於清河縣之東經安東達雲梯關而入於海此自宋及今兩瀆之故道也數年以來崔鎮諸口決而黃水遂北髙堰黃浦決而淮水遂東桃清虹泗山陽髙寶興泰田廬墳墓俱成巨浸而入海故道幾成平陸臣等受事之初觸目驚心所至之處孑遺之民扳輿號泣觀者皆為隕涕然議論紛起有謂故道當棄者有謂諸決當留者有謂當開支河以殺下流者有謂海口當另行開濬者臣等反覆計議棄故道則必欲乘新衝新衝皆住址陸地漫不成渠淺澀難以浮舟不可也留諸決則正河必奪桃清之間僅存溝水淮揚兩郡一望成湖不可也開支河則黃河必不兩行自古紀之淮河泛溢隨地沮洳水中鑿渠則不能別尋他道則不得况殺者無幾而來者滔滔昏墊之患何時而止不可也惟有開濬海口一節於理為順方在猶豫而工部遺咨叮嚀臣等親詣踏看臣等乃乘輕舠出雲梯關至海濵延袤四望則見積沙成灘中間行水之路不及十分之一然海口故道則廣自二三里以至十餘里詢之土人皆云往時深不可測近因淮黃分流止餘涓滴入海水少而緩故沙停而積海口淺而隘耳若兩河之水仍舊全歸故道則海口仍舊全復原額不必别尋開鑿徒費無益也臣等乃思欲疏下流先固上原欲遏旁支先防正道遂決意塞決以挽其趨築遙隄以防其決建減水壩以殺其勢而保其隄一嵗之間兩河歸正沙刷水深海口大闢田廬盡復流移歸業禾黍頗登國計無阻而民生亦有賴矣蓋築塞似為阻水而不知力不專則沙不刷阻之者乃所以疏之也合流似為益水而不知力不宏則沙不滌益之者乃所以殺之也旁溢則水散而淺返正則水束而深水行沙靣則見其髙水行河底則見其卑此既治之後與未治之先光景大相懸殊也每嵗不失修治即此便為永圖借水攻沙以水治水臣等蒙昧之見如此而巳至於復閘壩嚴啓閉疏濬揚河之淺亦皆尋繹先臣陳瑄故業原無竒謀祕䇿駭人觀聽者偶幸成功殊非人力實皆仰賴我皇上仁孝格天中和建極誠敬潛孚而秪靈助順恩威並運而黎獻傾心念轉輸乃足國之資軫昏墊切警豫之慮宵旰靡皇絲綸屢飭其始也並河漕以一事權假便宜以任展布故臣等得效芻蕘之言其既也逮偷墮以警𡨕頑折淆言以定國是故臣等得竟胼胝之力俯從改折之議國計與民困咸紓特頒賞賚之仁臣工與夫役競勸致兹無競之功遂成一嵗之內今兩河蒸黎歌帝德而祝聖夀者且洋溢乎寰宇矣臣等何敢貪天工以為巳力哉除用過錢糧聽巡鹽衙門查核奏繳外謹將完過工程總數開坐伏乞勑下該部覆議差官勘閲明實施行緣係恭報兩河工成仰慰聖衷事理謹題請旨計開淮北工程總管官中河郎中佘毅中督淮安府同知王琰兖州府同知唐文華桃源縣知縣郭顯忠濟寧衛指揮文棟等築完原分桃源縣北岸遙隄自古城起至關王廟止長八千六百八十九丈二尺俱根闊六丈頂闊二丈髙一丈至九尺不等塞完崔鎮大決口一處及劉真君廟等決口共三十