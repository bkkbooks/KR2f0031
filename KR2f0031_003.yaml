閘一座修完清江閘一座增砌荒細石塊共長二千二百九十二丈三尺旁開月河一道長九十三丈築完南北攔河壩二道共長三十五丈閘下兩岸并月河隄共長一百二十四丈俱用樁笆廂護議復營田兼攝州縣以廣招徠以利民生疏為議復營田兼攝州縣以廣招徠以利民生事該總理河漕右都御史潘季馴題前事據淮鳯營田道僉事史邦直呈據淮安府鹽城縣申稱本縣久罹水患幸得髙堰黃浦工成潦水不入露出荒田不下數萬頃節據窮民劉岊等紛紛告討牛種趂時開墾但庫藏空虗無從處措申乞借發營田官銀一千兩資民耕種三年補還緣由到道允發間續蒙漕撫部院信牌看得該道不以該縣非其所屬慨然以拯民為任允借前銀該縣又以三年償還為巳責其於地方撫墾良為有賴相應督催處置期有成效等因蒙此卷查萬歷四年十月內本道欽奉勑書開載駐劄淮鳯兩府適中處所督令有司親行阡陌招撫開墾欽遵行事至萬歷五年正月內該前任漕撫侍郎吳桂芳因淮安府屬州縣俱被水災難以施工具題止留山陽一縣加以徐沛豐碭蕭五州縣聽本道管轄其餘鹽城清桃宿邳睢安海州贛沭十州縣開除不入道屬又將鳳陽所屬潁夀亳三州潁上太和霍丘三縣改屬潁州兵備道共計本道所轄十八州縣更換新敕頒給外及查本道原額錢糧題奉欽依每年兩淮運司帶納引銀二萬七千兩江北四府三州解京錢糧扣除水腳銀二千七百餘兩及冠帶等銀共四年大約十一萬有零通聽營田支用今照鳳徐所屬十八州縣十五衛所招撫過軍民三千九百九十一户男婦計一萬七千六百四十二名口認墾田土一萬九千一百一十一頃一畝六分領牛一萬九百四十四隻種五萬六千三十四石二斗總計所費止用銀三萬八百八十七兩五錢見貯鳳陽府庫銀二萬九百七十四兩八錢運司未支及各府未解尚有六萬七千兩所據鹽城等州縣原係載在敕書關防緣一時有水難以施工權宜裁退彼時本道自揣愚陋固幸減一處省一處之勞可以偷安簡便乃今堰成水退地出民歸嗷嗷告缺牛種府縣計窮措處院部過勞痌瘝本道官名營田經理所轄雖未必家復人足而銀兩之積貯不用尚多乃坐視屯膏致鹽城等州縣來蘇之民沾被無由心誠未安况所借止於鹽城一縣其餘不能遍借者懸望更切合無乞將淮安水退可耕州縣不必另處錢糧不必另委官員查照本道建設之由再為題請仍責成本道興復掌印治農官專聽督率招墾年終册報舉劾庶朝廷恩澤不難於下究孑遺窮民不限於秦越有錢糧不艱于劑量有專官不難於責成一方困苦值久災極敝之後當河工底績之時更有所借以為牛種安業之具固天時地利人事共啓此方泰運也如或本道怠緩誤事空言無補即甘首斥以戒虗誑州縣若此一體查參等因具呈到臣據此先該臣等題為河患巳除流民復業乞恩蠲租以廣招徠事戶部覆稱淮安府屬山陽清河桃源鹽城等縣萬歷六年以前舊欠盡免七年以後撫按委官查勘具奏酌處至於處給牛種加厚貧丁一切優恤事宜聽督撫官便宜施行等因題奉欽依咨臣通行欽遵外今據前臣會同漕運巡撫侍郎江一麟巡按直𨽻監察御史李時成薑璧看得固本莫先於惠民省耕貴補其不足鳯陽地廣人稀淮隂頻年昏墊上厪廟堂軫念元元特設憲臣招徠開墾甫及三年而中都荒蕪皆成沃壤駸駸然民樂農桑之業矣惟獨鹽城等處向因地沈水底無田可營以故改除不在營田道屬兹者淮黃順軌水患盡除田土既乾流民四集告借牛種蓋不止鹽城一縣為然也該道限於所轄政難越施有司苦無錢糧澤難下究臣等皇皇方在區處而僉事史邦直忠誠體國憂勤為民毅然以地方自任要將淮安所屬鹽城等處仍舊督率一體撫墾散彼有嬴之財濟此待哺之衆民受其賜良非淺鮮合無乞勑該部查議將前鹽城清河桃源安東宿遷睢寧贛榆沭陽并邳州海州十處招撫開墾事務悉聽營田道督率掌印治農等官著實舉行仍乞換給敕書以便責成行事候年終聽撫按衙門考核成績破格敘録如或不效一併參懲庶官無分土而其澤易周民有餘資而其業易復矣緣係議復營田兼攝州縣以廣招徠以利民生事理謹題請旨兩河經略卷三
