body:
  text: 兩河經畧巻四明潘季馴撰恭報水孽既除地方可保永安䟽為恭報水孽旣除地方可保永安事該總理河漕右都御史潘季馴題前事據管理南河郎中張譽呈蒙職批委官揚州府同知韓相掲稟前事該職行拘黄浦居民郭松等審稱舊口南岸委因本年叁月拾捌日雷雨之後平地穴深丈餘方廣貳拾捌丈穴内遺骨數多俱被商民紛集搬拾去訖止見本家屋後遺有一物形如馬頭隨送韓同知所報相同行間又據郭三等抱送脛骨并齒角等骨前来竊照黄浦當髙堰之下流受全淮之傾瀉其浩淼停注為蛟龍之宅非一日矣故居民隂雨聞有異聲府官鑄符以圖鎮壓皆得於覩記之真者數年以来築塞之工頻施而隨脩隨壞樁埽之力既竭而愈刷愈深固人謀之未恊亦斯物之為祟也今蒙本院部親督官夫先築髙堰以殺其勢繼築兩壩以斷其流積水頓涸蛟龍無以藏身蛻骨騰昇風雷因而助勢真平成之竒徵曠世之希覯也昔漢以穿渠得龍骨遂以龍首名渠建伏龍祠史冊可考今獲龍首試騐果真顯跡更異從此隄防永固地方永賴是皆仰仗我皇上中和建極位育成功神明恊相淮瀆效靈之所致也似此靈異允宜獻諸朝廷昭太平於有象登諸簡冊揚休美於無窮本職祗役斯工躬覩其盛不勝慶幸除将郭三等抱送見在龍骨連人呈觧外理合具報等因到臣簿查三月二十五日先據同知韓相掲帖禀稱本月十八日黄浦兩壩築成横流盡涸一面調撥官夫興築舊口間忽於本日申酉時分風雨晦冥雷電交作達旦方霽隨據管工官宿州衛經歴崔文學稟據地方郭竒報稱今早起看舊口之南平地穴深丈餘方廣約二十八丈本職莫測其故延至二十四日閧𫝊連日灣泊商船并居民人等俱於穴内搬取龍骨數多當拘地方審詢間隨據居民郭松禀稱本家屋後遺有一物状似馬頭堅實如石見在其餘多被商民衆雜一時搬拾去訖職聞神龍無腦又聞龍骨黏舌職親加䑛試果符所聞又據地方鄉約陳轅等俱稱本浦自衝决以来向被蛟龍佔據毎遇隂雨即聞聲如鷄啼近因􅄵成水涸難以藏匿騰駕雲雨變化飛昇等情據此合将龍首送驗該臣批行南河分司訪查来歴明白申報去後今據前因并将續獲龍骨連人觧送到臣臣㑹同漕撫侍郎江一麟驗得骨質外璞如石腠理如礬挈之甚重䑛之黏舌再詢啇民搬取骨殖約有數十擔似非尋常水獸可比而衆見其地穴於雷雨之後骨見於地穴之餘皆謂龍之蛻骨而去無怪其然矣臣聞之荀卿曰積水成淵蛟龍生焉又聞之歐陽脩曰澤養千年龍蛻骨則龍之居於淵而能自蛻其骨亦理所有者然以臣愚之見言之其為龍與否新蛻與否若何而去俱不敢以臆度之說告之君父之前而總之水孽既去水患自除庶幾自此可慰我皇上南顧之憂矣伏念黄浦為髙堰下流髙堰既決黄浦繼之以全淮之水注入髙寳興鹽之間數邑田廬盡為蛟龍之窟乆矣臣等受事之初属寮士庶俱云堰浦為水怪所據㦯聞其聲㦯見其形沉舟敗艦無日無之官民船隻渡此如蹈湯火似非人力所制又查據淮安府囘稱萬歴五年六月十七日張真人過淮該府留駐紫霄宫建壇設醮製鐵符五十靣投水鎮之案巻見存全無應驗臣聞其言不覺悚懼第思之黄淮不塞則地方魚鱉之患何時而巳耶遂畢力興築而未敢以為必成也豈期兩􅄵甫築徵見果至於此是豈臣畚鍤之工所致哉皆仰賴我皇上純德格天至誠動物憫念一方昏墊之苦每厪宵衣旰食之懷獨斷廟謨羣言遂定恩威並濟衆志允孚昔劉昆以郡守之政能使猛虎之渡河韓愈以祭告之䖍遂致鱷魚之去海矧如陛下偹聖神文武之資成位育中和之化而有不足以孚格昆䖝鱗介之𩔖也哉君父之徳臣不敢蔽地方之事臣不敢隱除将原觧蛻骨首足共拾塊觧赴工部查驗外謹用上聞奉聖㫖龍骨着進内庫交收工部知道河工告成遵奉𠡠㫖分別効勞官員乞恩查覈俯賜允行以勵臣工以禆國計䟽為河工告成遵奉勑㫖分別効勞官員乞恩查覈俯賜允行以勵臣工以禆國計事該總理河漕右都御史潘季馴題前事據管河司道等官郎中佘毅中等呈将督完工程并分委官貟賢否各開報到臣除将完過工程另本具題外案查先該臣節奉勅諭内開選任司道等官俱許以便宜奏請委用功成之日通将効勞官員一體分別陞賞如有抗違不服及推諉誤事者文官五品以下武官四品以下徑自提問應奏請者奏請定奪欽此續准工部咨該臣等題為條列河工事宜乞恩俯賜俞允以便經理事該本部覆議一欵議分督内開司道等官自委之後雖遇陞調不許擅離候工完分別勤惰奏請處分方許離任又一欵議激勸内開在工州縣佐貳府衛首領雜職義民等官出入泥淖沭櫛風雨勞苦萬状而不大懸賞格何以令其畢力而終事耶候工完日将供事官貟查有効勞實績者分別等第題請超擢中間如有劣陞王官等項亦准改擢或從另議優處其隂醫等官重加賞犒如係義民給與冠帶仍與隂醫一體免其本等差徭等因題奉聖㫖河工事宜必須委任責成乃可期效今後分督司道及承委等官都着潘季馴等開送吏部暫停陞調通候河工完日總論功罪大行賞罰欽此備咨到臣兹當工完臣宜欽遵勅㫖甄别具陳除墮誤官五品以上臣等巳經參治五品以下徑自問戒外其有功人貟相應列叙但臣反覆思惟於心尚有未安者伏念臣嶔崎末路潦倒餘生偶值乏員謬蒙特簡入境之初目擊兩河分溢故道俱堙昔年耕刈之塲皆為魚鱉之藪以臣之才當此囏鉅非惟人心未厭臣亦自知其不堪矣二三之說因之沸騰盖疑其事之難成者十一而疑其人之不能成者十九也仰荷我皇上日月並明乾綱獨奮俯採蒭蕘之議嚴懲簧鼓之言元徳格天川靈效順至誠動物水孽旋驅俾臣等得竭犬馬之勞以效涓埃之報厥功告成絲粟皆我皇上神聖所致臣等祗切慶幸何敢上貪天工仰希天寵哉復念臣等奉役外服若非廟堂主持豈能展布内閣元輔張居正赤心報主畢力匡時當夷夏謐寜之秋尤惓惓以民生國計為慮當議論紛紜之日惟切切以委任責成為先開誠布公興千百載平成之績發縱指示祛數十年昏墊之憂同事輔臣張四維申時行雅抱寅工之志同厪巳溺之懐恊贊廟謨審事幾而千里皆如燭照力扶國是决大計而羣疑咸自氷銷臣等奉㫖不敢凟叙但元勲偉績實有不容冺者工部堂臣挈領提綱居中應外淵猷碩畫受成算於未事之先廣益集思定公是於淆言之日尚書李㓜滋始終主張部事固為惟允惟明侍郎何寛楊成陸光祖金立敬先今左右部事亦皆同心同徳工科諸臣王道成等敷陳悉殚忠忱道謀為之屏息計慮毎圖全勝河防藉以堅完先今都水司臣葉逢春陸檄等即始見終籌箸必稽乎長䇿察来知往和衷共濟乎時艱大工之成臣等實有賴於内庭之臣者如此也先今巡按御史崔廷試李時成巡鹽御史董光裕姜璧巡漕御史陳世寳茹宗舜志存拯溺義切同舟諮諏咸藉折衷閱勘殊多鼓舞或䖍其始㦯相厥成均為有禆而覈支放以免虚冒之弊留漕米以活既疲之夫尤有禆焉山東巡撫都御史趙賢巡按御史錢岱心忘有我念切周隣委属調夫荅捊應響工力之借辦於山東者甚殷二臣之襄助扵兹役者甚大漕運總兵靈璧侯湯世隆任乆而聞見自真心虚而咨詢獨確官兵赴役約束甚嚴鎮臣宣勞尤徵忠悃大工之成臣等實有賴於地方之臣者如此也以上諸臣委扵河工禆益縁係大臣憲職通候聖裁臣不敢叙夫以兩河工程所藉手於内外臣工者如此在工諸臣又何敢以言功哉但主持劻勷之力不無仰藉於人而胼手胝足之勞誠有不容冺者臣謹遵勑㫖㑹同漕撫侍郎江一麟逐一稽覈明實分別等第敬為皇上陳之以總管官言之如中河即中佘毅中遇事輒有定力此中卓有區裁夷險周知措注如探囊取物鉅囏克任施為真就􅍄御輊固其源而委自塞巳恊神工培其縷而遥亦成實竭人力官夫戴若父母地方賴以生全南河郎中張譽明秉幾先故臨岐不至於見惑智周意外故投艱每見其不窮置身於巨浪之中更歴寒暑而處之自若樹功於積廢之後備嘗險阻而成之晏如浦堰之防既堅桑田之利巳溥海防兵備兼管河道叅政龔大器區畫精明属吏有同臂使撫摩真切貧夫咸若子来必躬必親凡有規為而大小競勸其難其慎一經相度而終始不渝當河湖交滙之區成屹然可恃之障徐州兵備兼管河道叅政㳺季勲視國事如家事圖乆逺于猝辦之餘以民身為巳身寓調停于督催之内當前官墮誤之後尤急急于分人之勞居水陸要衝之衢猶孜孜以竣其役外無拮据之状實多康濟之功水利道副使張純敭歴乆而視河如視掌分合不爽分毫識見融而治水如治棼尺寸皆中肯窽兩堤相去數舎往来之督理惟勤八淺一決有年外内之䕶持甚哲潁州兵備兼管河道僉事朱東光雄才曠識邁出等夷偉略忠謀足當一面工肩百里居水激沙堙之塲而凝然不動聲色身将萬夫當祁寒伏暑之時而熈然㒺有怨咨營田道僉事史邦直沉毅有為仁明能斷築堤于巨浸之内甃砌獨當其艱取石於大江之濵採運尤多其智棄孱嬰於襁褓而不顧違雙親之逺視而不歸終嵗旅棲尤徵其苦以上㭍貟才識俱優心力俱瘁論功為首所宜優叙而朱東光史邦直資俸巳及三年相應加議佘毅中張譽係部司實授五品且宜乆任相應破格加陞以成永賴者也清江厰主事陳瑛通明每中機宜純實自能幹濟運河隄決分猷茂著賢勞髙堰板樁恊理尤多雅義揚州府知府虞徳煜誠能合才寛以濟猛濬數十里之運道成功曽不逾時鑿百千丈之屯河縮費大裒原額淮安府知府宋伯華㢘不近名公能得衆處最衝最煩之地百責攸萃而應辦自周當乆災乆疲之餘各閘告成而調停自善以上三員心力俱竭工程少簡所當併叙而陳瑛歴俸巳逾四年似應優擢虞徳煜宋伯華似應加陞服俸仍管府事者也原任北河郎中徐儒見任郎中張徳夫管理泉閘主事張文竒夏鎮閘主事王煥山東管河道副使邵元哲徵調官夫隨取隨發俾在工諸臣得以緩急濟用漕儲道叅政陳文燭督理便河分猷分瘁俾管河司道得以專力本工兩淮運使王憑館糓添設寅寮纎悉皆為備具俾黄清曹鉷得以安心供職以上七員所當量加賞賚以勸其後者也以分管官言之淮安府管河同知王琰兖州府管河同知樊克宅唐文華揚州同知韓相兩淮運副曹鉷廬州府通判今陞無為州知州查志文鳯陽府通判李光前東昌府通判王一鳯歸徳府通判祝可立徐州知州孫養魁邳州知州張延熈清河縣知縣石子璞桃源縣知縣郭顯忠中軍以都指揮體統行事指揮僉事俞尚志以上十四貟忘身狥役悉意奉公築堤則覔土之難如燕壘巢日計分寸塞決則捲埽之苦如蟻封穴工校錙銖董萬夫于烈日怒濤之中而怨聲不作惟是先勞濟大事于沙塞水盈之時而晷刻不爽更多頴敏黧其靣癯其形何有髪膚之愛力巳疲嵗巳易曽無倦勤之私均應首叙内王琰樊克宅唐文華諳習河務似應加陞職銜仍行管河者也查志文雖經陞任仍應加銜管理該州者也淮安府同知鄭國彦蔡玠帶銜同知劉順之揚州府通判王開廬州府通判宋守中揚州府推官范世美廬州府推官胡載道江都縣知縣秦應聰靈璧縣知縣張允孚徐州叅将黄孝敢泗州守備張大徳陞任衛鎬濟寜衛指揮文棟以上十三貟允懷急公之義率多任事之勤分勞畚鍤不辭雨夜之艱稽覈錢糧絶無毫髪之爽㦯經畧于初㦯接管于後較之全功雖歉而心力俱無不周㦯坐籌于公所㦯催辦于任中較之野處稍閒而才識俱有可取均應倂叙内劉順之相應准贖者也揚州府通判郭紹淮安府通判况于梧山陽縣先後知縣胡希舜魯錦寳應縣知縣李贄安東縣知縣史選以上陸員事值鉅艱常多匡助若鳩工料實効勤劬所當量加賞賚以勸其後者也以散委州縣佐貳首領等官言之六安州同知浦朝柱泰州同知王法祖泗州同知易宗宿州同知李茂元邳州同知王誠判官胡𫝊徐州判官胡三徳通州判官李應魁沛縣縣丞吕學申儀真縣縣丞吳子恕魚䑓縣縣丞黄穆興化縣縣丞張相陽糓縣主簿張祖范揚州府經歴葉逢𤾉宿州衛經歴崔文學海州吏目甘梆亳州吏目吕堯煥通州吏目周敏政單縣典史岑登巢縣典史王公祚宿遷縣典史陳良璧来安縣典史林公松定逺縣典史何養浩頴上縣典史朱良臣海門縣典史李廷瑞靈璧縣典史李時先淮營名色把總諸葛堯賔立功名色把總宋大斌徐州左衛鎮撫蒋助以上二十九員經理有方承委便能速辦操持無染督夫每見争趨出入泥淖之中墮指裂膚而不顧見者俱為酸心棲遅草茇之内餐風沭雨以為常察之全無惰意忠勤可取優擢允宜相應首叙内名色把總二貟應咨兵部一體准行陞贖者也亳州同知潘良旦濵州同知辛自實海州同知李逢合肥縣縣丞髙㓜元山陽縣縣丞陳國光蕭縣主簿趙永福聊城縣主簿陳嘉兆武城縣主簿喬遇山陽縣主簿吳一道汶上縣主簿李廷佐江都縣主簿鄒東周靈璧縣主簿喻鵬沛縣主簿陳存之留守司經歴屠鑰廬州府經歴李簡淮安府照磨雷雨檢校周藻廬州衛經歴黄自性濟寕衛經歴林大原邳州衛經歴周學孔徐州左衛經歴林英揚州衛經歴任重滁州吏目吳夢麒夀州吏目沈淮泗州吏目劉一龍嶧縣典史辛元禄揚州府稅課大使吳炤徐州衛鎮撫薛守田大河衛千戸許圜以上二十九員率作甚勤奉法惟謹㦯任畚鍤之役㦯承奔走之勞緩急皆為得濟部夫無逃亡之虞支銷無尅減之弊工程因以堅完相應併叙量加服俸文職仍咨吏部免其劣陞者也以部夫省祭官義民言之定逺縣省祭伊儒夀州省祭曹仁泗州省祭于子貴天長縣省祭董梅来安縣省祭于顯東阿縣省祭戰伯前山陽縣省祭張濟儀真縣省祭郭忠徐州義民張奎邳州義民胡巡楊去甚陳潛曹縣義民囘守節濟寕州義民田輅山陽縣義民胡應華江都縣義民許國忠以上十六員名分雖卑而識見頗出儔衆力既竭而終始克効勤勞除臣等自行奨賞外應照題奉欽依事理省祭咨行吏部紀録即命赴選量為優處義民工部出給劄付給以冠帶免其雜泛差役者也各該大小官員列叙似覺煩𤨏然于百千稠人之中詳審精擇方得此數且臣等目撃其苦每為隕涕誠有不能蔽者故敢冒昧陳凟再照天下之事每成于同夫人之情恒善其異我皇上洞燭河工僨事之由特頒河漕併一之令廟謨睿筭超軼千古然使任事者不能仰體聖心少有疑阻亦烏能有成哉漕撫侍郎江一麟休休有度曽無炫能競智之私蹇蹇匪躬真得同寅恊恭之義議未定則周諮荒度以求是固不毁方以狥人議旣同則併力一心以求成未嘗拂衆以從巳分工計餉舉皆經濟之才猷布令張官悉其方畧之指授籌兹勞勛實應首被殊恩者也伏望皇上推原主持定議之功爰及恊助劻勷之力憫念羣工勞苦之乆特嘉撫臣心膂之同勑下該部請官勘實覆擬上裁俯垂陞賞則人心勵而國計永有賴矣緣係河工告成遵奉勑㫖分别効勞官員乞恩查覈俯賜允行以勵臣工以禆國計事理謹題請㫖大工告成川靈效順謹循舊例懇乞遣祭大海河淮諸神以答休貺以祈永賴䟽為大工告成川靈效順謹循舊例懇乞遣祭大海河淮諸神以答休貺以祈永賴事該總理河漕右都御史潘季馴題前事據管河郎中佘毅中張譽主事陳瑛管河兵備等道叅政龔大器㳺季勲副使張純僉事朱東光史邦直呈稱照得頻年以来黄淮二瀆潰決横行不循壑海之性海口一帶積沙淤墊頓失茹納之常下流愈壅上流愈潰以致淮北淮南河幾成陸民悉為魚上厪宵旰之憂誠二百年希覯之患也去嵗荷蒙聖主特簡本院部建議題請肇舉大工塞諸決以挽正河剏遥隄以𢎞保障築髙堰以捍長淮復閘􅄵以嚴啓閉陂栁浦以防内灌建减􅄵以宣盈溢甃寳應之石隄濬揚河之淤淺諸所興建盖自徐邳以至淮揚方千有餘里之逺向来無一處非患區今則無一處不整頓矣而工期堅乆則事難猝成且在河道當大壞極敝之餘在地方值災傷孑遺之後興兹鉅役實為艱危職等祗役各工兢兢朝夕雖以治河之正理揆之固逆知其必成而不敢謂其成之甚速以河海之常性卜之固逆知其必治而不敢謂其治之甚速大小臣工蒿目嘔心寝食靡暇其黙禱於明神之佐佑徼惠於宗社之福祚者盖匪徒循行禋祝之彌文巳也今役甫浃嵗而工倐告成工方就緒而河即順軌往時河身墊髙人皆以為莫知底止矣而今則漕深數丈岸髙丈餘往時淮水南灌人皆以為不可挽囘矣而今則悉由清口㑹黄注海二瀆旣巳合流海口愈益深闢至如遥隄苦取土之逺髙堰當巨浪之衝興工之初人皆疑畏以為必難就緒而今皆髙厚堅實屹如岡陵且民不告勞費有省剰即今漕渠通利萬艘懽呼沮洳成田流移四復誠兩河曠見之景宗社無疆之福也此豈臣等畚鍤之力所能致哉盖由我皇上神聖麗天明良合德至誠孚格下逮百神故河伯海若交相助順若此揆諸典禮允宜祭謝用答神休且祈遐貺查得嘉靖四十五年夏鎮新河告成蒙世宗皇帝特諭禮部行翰林院撰發告文太常寺差官齎捧香帛命總理河漕諸臣不論有無祀典神祗一體祭謝又查得隆慶六年經理徐邳堤工蒙穆宗皇帝俯俞河漕衙門題請亦照前例欽發告文香帛祭告其在先朝以工成祭謝者尤未易悉數况今兹之役舉全漕要害之流悉臻翕順奠兩河昏墊之衆咸獲敉寕較之前工不啻倍蓰則明神毗國衛民之力尤當申酬伏乞照例題請舉行庶神靈有常格而運道可永保矣等因到臣據此該臣㑹同漕撫侍郎江一麟㸔得國家之舉大事動大衆也其謨謀率作固在人為而隂助黙相寔藉神力故書稱望于山川詩稱是𩔖是禡而漢儒劉向釋記者四瀆視諸侯之義謂其能蕩滌垢濁而通百川于海也大禹治水可謂神矣然亦恭禱陽旴之野齋求宛委之山故平成之功萬世為烈而迄今言致孝鬼神者必歸焉今兹大役復十數年横決之河淮通十數年淤塞之海口障狂瀾于旣倒拯積患于浸淫無論臆決坐談之士相與目攝以為難就即臣等感激特恩欽承廟斷固自矢捐糜剪此朝食而内省謭劣亦惴惴焉竊懼無能為役也故自興工至今每率屬禱神竭䖍求祐中間徵應之竒翼相之巧有未敢一一凟聞于君父之前者即如黄浦決塞之餘水孽乗雷而蛻去三伏霪潦之後河身倐滌而反深或開㦯堙動恊人意時𤾉時燠大慰輿情實川靈效順之明徵非區區人力所能致此皆仰仗我皇上敬天勤民任賢圖治故百神受職諸福方来臣等偶藉奏功誠不敢忘所自也所據諸臣呈乞照例題請祭謝委屬相應伏望我皇上軫念漕河闗係之重俯鍳明神恊相之功𠡠下該部查照先年事例議覆上請欽發告文香帛差官齎捧前来容臣等督率司道等官擇吉祭謝大海河淮之神仍查濵河凡建有神廟處所俱一體分行就近司道督同州縣等官致祭以示報賽庶祀典聿脩而人神胥慶成功可保而河漕永頼矣縁係大工告成川靈效順謹循舊例懇乞遣祭大海河淮諸神以答休貺以祈永賴事理謹題請㫖隄決白附伏念季馴潦倒餘生謬蒙抜擢感激圖報不自分量欲收全河之功以報殊常之遇𤨏𤨏陳凟悉荷俞㫖自六月以来鳩工聚材事頗有緒但聞僉謀未恊以致異議紛然萬一廟堂之上偶揺于三至之言道旁之舎終隳于半途之築馴百其身何能贖哉馴昔治邳河之時通復故道一百二十里堅築兩隄共三百里然因人情不恊竟以塞決論黜若非邳河無恙公論復明馴何辭于今日哉傷弓之鳥慮之不得不周傷虎之人談之尚令色變敬用條列于後奉塵清徹伏望留神詳閱如有所否仰祈指教容馴虗心改從如敢固執巳見自敗巳事明神殛之臨楮不勝懇懇一議決口不可不塞前件塞決之難難于升天昔漢塞瓠子之決天子躬臨羣臣負薪投馬沉璧方克有濟馴豈好為艱難之事以自取勞苦哉但細細籌之實有不可巳者盖自崔鎮至清口共九十里使崔鎮決而此九十里者深廣如故決可以不塞也使崔鎮決而決内坡地遂能衝刷成渠河水有容受之地汪洋迅駛一瀉而出灌口以逹於海決亦可以不塞也今自崔鎮而下九十里間由冬以及初夏水不滿三尺糧艘過此必用小船起剥殆盡方可通行入伏以来水僅七八尺而淤沙四壅舟師尋討中溜方能無滯此在故道之水然也再查決内之水去口一二十丈間深可丈餘稍入坡内止深一二尺矣即入伏以来亦不過三四尺耳數百里間散漫無歸包涵停蓄滿而後溢故出灌口者緩而清此在決口之水然也再查徐州至宿遷縣河水皆深四丈至三丈四五尺一過決口便以尺計何也盖水分則勢緩勢緩則沙停也馴恐河性最急滔滔西来一至崔鎮由故道既不順由決口又不順則崔鎮而上能保其無虞乎上愈決則下愈壅恐桃清而下即二三尺之水亦不能保其常存也議者又云伏秋暴漲再潰可慮此說不為無見但馴原陳疏内有請建滚水􅄵三座每座長三十丈髙及隄之半滚水者減水也水至隄半即任其滚出隄外也所減之水亦從灌口出海此與留決無異但決口與河身等故能掣全河之水減水􅄵髙出于岸故止減盈溢之水水落則河身如故也議者又云往因淮黄並流勢不相敵故淮避而東今諸決旣塞兩河復合則髙家堰清江浦之堤其能保乎此說似尤有見但查兩河合流自元以前無論巳即平江伯剏築髙堰之後幾二百年合流無恙至隆慶年間髙堰決而後淮南為水困尋復築之而淮揚無水患者二年惜以錢糧缺乏所費僅六千餘金以致卑薄易潰而人遂有避河之說夫淮避河而東矣河之決崔鎮也亦豈避淮而北乎盖髙堰決而後淮水東崔鎮決而後河水北隄決而水分非水合而隄決也再查二河入海處所如安東雲梯關等處河靣俱濶數里海沙一望無際水至沙刷深廣如故何有於二河哉止緣隄決河分議者遂歸咎于海口之不容而不知上決而後下壅非下壅而後上決也季馴初亦疑之後奉大司空之教親往閱視乃知其故盖益信千聞不博一見矣續即今清口以外之水較之去嵗黄淮未合之時反覺銷減盖昔日水分勢弱不能攻沙故㳙滴之流皆浮沙面祗見其髙今水合勢盛併力攻沙故尋丈之水皆出河底祗見其卑此其明騐也議者又云黄河遷徙淤塞殊不足憂去年崔鎮決出大河口大小民船皆由此出何嘗一日停也但一時泛漲漫散田禾民舎不無淹没飄敗為不便耳此殆不然夫決水所行之處皆係民間住址陸地正河淹塞漫無所歸輕舠偶一由之而樹樁基往往觸敗豈可恃為運道若至冬春之間水僅尺寸即輕舠亦不能行矣况運船經過處所雖裏河亦欲築隄以便牽挽乃可令之由決乎至若千里之間所至田廬飄敗江撫院閱視之時曽為含淚浃旬之間食不下咽而議者僅云不便無人心矣議者又云為今之計當先将崔鎮口䟽濬深廣使黄水盡由北出此則自知其決内淺阻不能䟽泄而姑為是說矣夫自崔鎮以至灌口五百餘里茫無畔岸何事再廣獨欲濬之使深則非人力所能為者水中施工旣難措手而住址陸地扒撈更難如果可濬則桃清以下又何任其沙塞耶此二說似為瞽者觀塲聾者論樂不足辨也一議遥隄不可不築前件築隄與塞決之工相因盖隄不築則水不歸漕不歸漕則水從他決決則正道必淤故築隄所以防決也若隄不築則決亦不必塞矣考之禹貢云九澤旣陂四海㑹同𫝊曰九州之澤已有陂障而無潰決四海之水無不㑹同而各有所歸由此觀之則禹之導川距海亦必先障上流也然舎縷水隄而築遥隄者盖因縷隄即近河濵束水太急怒濤迅溜必至傷隄遥隄離河頗逺㦯一里餘或二三里伏秋暴漲之時難保水不至隄然出岸之水必淺旣逺且淺其勢必緩緩則隄自易保也議者又云遥隄内峙縷隄外閑中間積潦之水或縷隄決入黄流何處宣洩職應之曰遥縷兩頭原無􅄵阻且因髙岡遇湖口處俱有斷頭非如櫃笥周匝包裹也縱有積潦決水皆順隄直下仍歸大河矣若縷隄内居民亦有水淹之慮職巳諭其移住遥隄或六月初旬移居九月初旬仍歸故址自可無患然縱無二隄每嵗水發能免淹浸乎恐愈甚耳議者又云髙堰旣築泗州之水不免停蓄職問之曰泗州之水蓄于髙堰未決之前或在髙堰巳決之後彼云在堰決後職曰是固然矣髙堰決而後清口塞清口塞而後海口堙海口堙而後上流蓄盖堰東皆係民間田地丘墓宣泄不順豈如入海為建瓴勢也堰決而水蓄則堰當築明矣泗州商販専利堰決直逹淮揚故為此說不足信也議者又云職以樁板護堰可能乆乎職應之曰樁板不可乆也隨圯隨修可乆也是以有守隄夫之設也新築客土非板不免汕刷一二年後土脉烝結無板亦可江湖河海之濵皆土岸也能盡以板乎兩河經畧巻四
