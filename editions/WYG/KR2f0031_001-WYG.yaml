body:
  text: 兩河經畧巻一明潘季馴撰奉明㫖陳愚見議治兩河經略以圗永利疏為奉明㫖陳愚見議治兩河經略以圗永利事據管理河道工部郎中佘毅中施天麟張譽管河兵備等道㕘政龔大器副使林紹張純章時鸞僉事朱東光水利道僉事楊化各曹呈䝉臣并漕運巡撫侍郎江一麟劄付備仰職等躬歴各該地方逐一查閲要見徐沛豐碭縷水及太黄長隄衝決者作何築塞茶城正河變遷由小浮橋出果否成河崔鎮等決黄水泛溢正漕淤阻作何堵築徐邳一帶長堤應否加幫宿桃以南應否接築老黄河故道應否開復髙家堰應否修築新城外一帶老隄是否低薄或原基短促相應接築草灣既開復淤作何濬治或應棄置仍復雲梯關故道黄浦口見今水従東決一望瀰漫以致髙寳揚州一帶淺阻因何不行築塞髙寳一帶隄岸有無足恃逐一詳議虚心講求或應修復舊河或應别求利涉勿拘成案勿避煩勞上禆國計下奠民生以圗久安長治之策畫圗貼説具由通詳等因䝉此隨該職等前往徐沛淮揚等處督同淮安府知府宋伯華揚州府知府虞徳煜管河同知王琰蔡玠劉順之并各州縣掌印管河等官逐一細加查勘従長計議㸔得水性就下以海為壑向因海壅河髙以致決隄肆溢運道民生胥受其病故今談河患者皆咎海口而以濬海為上策則誠然矣第海有潮汐茫無著足不得巳而議他闢豈知海口視昔雖壅然自雲梯關肆套以下濶柒捌里至十餘里深皆叄肆丈不等縦使欲另開鑿必須深濶相𩔖方便注放則工力艱鉅必不能成矧未至海口乾地猶可施工及將入海之處則潮汐往来亦與舊口等耳且海之舊口皆係積沙人力雖不可濬水力自能衝刷乃若新闢之地則土壤堅實不特人力難措而水力亦不能衝故職等竊謂海無可濬之理惟當導河以歸之海則以水治水即濬海之策也然河又非可以人力導也欲順其性先懼其溢惟當繕治隄防俾無旁決則水由地中沙隨水去即導河之策也顧頻年以来無日不以繕隄為事亦無日不以決隄為患何哉卑薄而不能支迫近而不能容雜以浮沙而不能久隄之制未備耳是以黄決崔鎮等口而水多北潰為無隄也淮決髙家堰黄浦等口而水多東潰隄弗固也乃議者不咎制之未備而咎築隄為下䇿豈得為通論哉又有所未盡者上流既潰地以旁決矣至於下流復或岐而分之其趨於雲梯關正海口者譬猶強弩之末耳盖徒知分流以殺其怒而不知水勢益分則其力益弱水力既弱又安望其能導積沙以注于海乎職等故謂今日濬海之急務必先塞決以導河尤當固隄以杜決而欲隄之不決者必真土而勿雜浮沙髙厚而勿惜鉅費讓逺而勿與争地斯隄於是乎可固也如徐邳桃清沿河各堤固矣崔鎮等口塞矣則黄不旁決而衝漕力専髙家堰築矣朱家口塞矣則淮不旁決而㑹黄力専淮黄既合自有控海之勢又懼其分之則力弱也則必暫塞清江浦河而嚴司啟閉以防其内奔姑置草灣河而専復雲梯以還其故道仍接築淮安新城長堤以防其末流盡令黄淮全河之力㳙滴悉趨於海則力强且専下流之積沙自去下流既順上流之淤墊自通海不濬而闢河不挑而深矣此職等所謂固隄即所以導河導河即所以濬海也猶慮伏秋水發暴漲傷堤職等查得吕梁上洪之磨臍溝桃源之陵城清河之安娘城等處土性堅實可築滚水石壩叄座若水髙於壩任其走泄則水勢可殺而兩隄無虞矣至若寳應石隄之當復與夫下流支河之當疏揚州運河之當濬皆今時之切務所宜次第併舉而不可緩者也但前項工程自豐沛徐淮以至海口共長千有餘里自清江浦以至儀真共長叄百餘里地勢遥逺工程浩大一時錢糧未措人夫難集除前請發銀貳拾萬兩并截留漕粮捌萬石一面先將豐沛縷隄太黄遥隄及徐邳一帶縷隄酌量幇築桃清南隄併接淮安新城長隄乗時創築髙家堰兩頭水勢稍緩先行築塞寳應湖先用樁笆修築土隄外其餘各項工程相應大加修舉者一面請發錢粮調集官夫買辦物料次第興舉務保無虞等因并將應做工程列欵呈詳到臣據此該臣查得接管河道巻内先准工部咨為竭愚忠陳末見以禆安攘事該御史柴祥題踏勘彭城淮邳等處某處河身淤塞作何疏濬某處隄岸窄狹作何展築某處下流可開支河則滌為數河以分水勢某處海口果有束隘則多方開通以達於海等因又准工部咨為敷陳末議懇乞聖明亟賜舉行以禆將来粮運大計事該御史陳世寳題開三義鎮引入清河縣北或出大河口或出清河縣西另開壹河何者為便従長定議又准工部咨為河患頻仍運道艱阻懇乞聖明亟賜議處以禆國計以奠民生事該南河郎中施天麟題要停運㫁流大挑河身該部覆題動支官銀製造平底方舟長柄鐵爬躬親試驗如果挑濬有效先於淤墊最髙處逐段濬去或大興工役應否停運仍將髙家堰并朱家等口築塞至於髙郵寳應隄間多建減水大閘隄下多開支河俱聴従宜處置其黄浦口可塞則塞如另為入海壹路可疏下流亦宜建減水大閘水漲則任其外流水消則儘閘而止等因又准工部咨為河患愈深經治鮮效懇乞聖明特彰宸㫁審機宜以圗匡濟事該工科都給事中劉鉉題疏海口洩下流或濬草灣之口使之開廣或疏雲梯關之淤使之復舊應開海口去處如鹽城安東五港金城一帶孰為利便并查小浮橋新衝之口可否濟運如有淺阻亦要設法開濬等因又准工部咨為披竭愚衷敷陳治河事宜以備採擇以安國計事該戸科給事中李涞題要見安東金城雲梯關等處某處地方堅實可以另開壹河以洩河淮下流興化鹽城沿海廟道口新興場牛團舖等處某處可以多濬拾餘口以導射陽諸水入海相度計議的確陸續修舉其徐吕而下河身淤髙之當疏老黄河故道之當復髙家堰潰決之當築髙寳湖平水閘分水河之當修俱聴詳估等因又准工部咨為摘陳急治河淮事宜乞發錢糧以濟興工以保運道以安民生事該工部題覆前任總理河漕尚書吳桂芳掲帖内議南京户兵二部將庫貯粮剰馬價等項銀兩各支壹拾萬兩差官解至淮安府庫收貯及咨户部速將見年尾幇漕粮奏請准留捌萬石咨行漕運衙門分貯沿河各倉聴候支用其徐沛以上宿遷以上小河口以下及髙家堰淮口各項工程趂今水尚未發上緊修築不可因而廢工等因又該臣欽奉勅諭内開備查草灣口何為既開復淤及今作何開通全淮水何為南徙不復及今作何疏導徐邳河身髙並州城何以疏之使平黄浦崔鎮等口久塞無功何以築之使固及查諸臣歴年建議有行奏疏逐一勘議要見老黄河故道應否開復清桃正河應否挑濬髙家堰寳應堤應否修築小浮橋新衝口可否濟運應否加挑又徐邳以上地形南昂北下恐隄防壹潰勢必奔流北徙將為閘河之梗亦要審其孰為正河孰為支河孰為合河或正而當厚其防或支而當殺其勢或合而當分其流一併勘議詳妥奏聞區處欽此又准工部咨為新開海口復淤河患不測乞勅當事臣工多方計處以圖永濟事該工科都給事中王道成題行臣親詣雲梯關踏勘果否原係黄河入海之口従前何以通流今日何以一線詳相其勢明求其故仍自海口而上逐處講求及備查草灣何時復淤作何開濬或另擇堅實之地多開數口以為通海之路金城以下何以久不疏通崔鎮決口何以築之使固桃源長隄應否修築髙家堰應否修理老黄河應否開復大端委官之言決不足慿務必躬親庶有真見合用錢粮應於何處動支原題請各官何以處之使得効力一一籌畫委妥等因准此案照前事已經㑹案劄行各該司道逐一勘議誠恐轉委屬官不足慿信該臣㑹同漕運巡撫右侍郎江一麟躬親督率沿河荒度南遡維揚㸔得儀真東關歴石人頭揚子橋三議河直抵髙廟止一帶運河淤淺寳應一帶湖堤圮壊黄浦決口渰及數邑髙家堰水射淮揚清江浦長隄卑薄栁浦灣至髙嶺無隄障禦西窮鳳泗看得全淮不下清口日益南徙北抵清桃看得崔鎮諸決水従旁洩一望瀰漫正河淤淺徐沛以上崔家口新河淺阻北陳一帶水行陸地僅盈尺餘東抵海口看得新挑草灣尋復淤塞今自清口至西橋一帶河流復通但不及故河拾分之壹自安東以下河身漸廣雖有淤淺未復全河然河水東下亦無阻礙隨處患害一一查閲明白又經催行司道議呈去後今據前因除徐州迤北新衝崔家口之議另行具題外該臣㑹同漕運巡撫右侍郎江一麟議照事師古者㒺愆智不鑿者乃大孟子論智一章首以禹之治水為喻而論為政則曰為政不因先王之道可謂智乎是大智者事必師古而不師古則鑿矣故治河者必先求河水自然之性而後可施其疏築之功必先求古人已試之效而後可倣其平成之業黄水来自崑崙入徐濟運歴邳宿桃清至清口㑹淮而東入于海淮水自洛及鳳歴盱泗至清口㑹河而東入于海此兩河之故道即河水自然之性也元季嵗漕江南之粟由揚州直北出廟灣入海至永樂年間平江伯陳瑄始隄管家諸湖通淮河為運道然慮淮水漲溢東侵淮郡也故築髙家堰堤以捍之起武家墩經小大澗至阜寜湖而淮水無東侵之患矣又慮黄河漲溢南侵淮郡也故隄新城之北以捍之起清江浦沿鉢池山栁浦灣迤東而黄水無南侵之患矣尤慮河水自閘衝入不免泥淤故嚴啓閉之禁止許漕艘鮮船由閘出入匙鑰掌之都漕五日發籌壹放而官民船隻悉由五壩車盤是以淮郡晏然漕渠永賴而陳平江之功至今未斬也後因剥食既久隄岸漸傾水従髙家堰決入壹郡遂為魚鼈而當事者未考其故乃謂海口壅塞遂穿支渠以洩之盖欲亟拯淮民之溺多方規畫以為疏導之計其意甚善而其心亦良苦矣詎知旁支暫開水勢陡趨西橋以上正河遂致淤阻而新開支河濶僅貳拾餘丈深僅丈餘較之故道不及叄拾分之壹耳豈能容受全河之水下流既壅上流自潰此崔鎮諸口所由決也今新開尋復淤塞故河漸巳通流雖深濶未及原河拾分之壹而兩河全下沙隨水刷欲其全復河身不難也河身既復面濶柒捌里狹者亦不下叄肆百丈滔滔東下何水不容若猶以為不足而欲另尋他所别開壹渠恐人力不至於此也以臣等度之非惟不必另鑿壹口即草灣亦須置之勿濬矣故為今之計惟有修復平江伯之故業髙築南北兩隄以㫁兩河之内灌而淮揚昏墊之苦可免至於塞黄浦口築寳應隄濬東關等淺修五閘復五壩之工次第舉之則淮以南之運道無虞矣堅塞桃源以下崔鎮口諸決而全河之水可歸故道至於兩岸遥隄或葺舊工或剏新址或因髙崗或填漥下次第舉之則淮以北之運道無虞矣淮黄二河既無旁決並驅入海則沙隨水刷海口自復而桃清淺阻又不足言矣此以水治水之法也若夫扒撈挑濬之説僅可施之於閘河耳黄河河身廣濶撈濬何期悍激湍流器具難下前人屢試無功徒費工料但恐伏秋水發淫潦相仍不免暴漲致傷兩堤故欲於磨臍溝陵城安娘城等處再築滚水壩叄道萬一水髙於壩任其宣洩則兩隄可保而正河亦無淤塞之患矣徐州以南之工如此而已或有難臣者曰臣等欲順水性今淮水欲東而乃挽之使北黄水欲北而乃挽之使東無乃水性之未適乎臣曰水以海為性也決水乃過顙在山之水也非其性也或者又曰昔禹治河播九河同為逆河入于海今臣等乃欲塞諸決併二瀆而不使之少殺耶縦有滚水壩僅去浮面之水百壹耳亦烏能殺其勢也臣應之曰九河非禹所鑿特疏之耳盖九河乃黄河必經之地勢不能避而禹仍合之同入於海其意盖可想也況黄河經行之地惟河南之地最鬆禹導河入海止經郟縣孟津鞏縣三處皆𨽻今之河南一府其水未必如今之濁今自河南府之閿鄉縣起至歸徳之虞城縣止凡五府河巳全經其地而去禹導河之時復三千餘年流日久土日鬆土愈鬆水愈濁故平時之水以斗計之沙居其陸壹入伏秋則居其捌矣以貳升之水載捌升之沙非極湍急即至停滯故水分則流緩流緩則沙停勢所必至者臣等不暇逺引他證即以近事觀之草灣一開而西橋故道遂淤崔鎮壹決而桃清以下遂澀去嵗水従崔家口出則秦溝遂為平陸此眼前事也又何疑哉所據司道諸臣欵議前来臣等復加㕘酌似應允従伏望敕下該部再加查議如果臣等所言不謬俯賜俞允行臣等遵照及時興舉除工程夫役錢粮數目另本具陳其緊關工程如髙家堰淮城北隄馬厰坡濬揚州諸淺并塞小缺口拾肆處工所必舉而伏前尚可舉事者一面分投興工外縁係奉明㫖陳愚見議治兩河經畧以圗永利事理謹題請㫖計開一議塞決以挽正河之水竊惟河水旁決則正流自㣲水勢既微則沙淤自積民生昏墊運道梗阻皆由此也臣等查得淮以東則有髙家堰朱家口黄浦口叄決此淮水旁決處也桃源上下則有崔鎮口等大小貳拾玖決此黄水旁決處也俱當築塞但伏秋之水相繼而至非惟地為水占無處取土抑且波濤洶湧為工不堅除將決口稍窄者見在分投興築外其決至數拾丈以上者一面鳩集工料相時興舉伏候聖裁一議築隄防以杜潰決之虞照得隄以防決隄弗築則決不已故隄欲堅堅則可守而水不能攻隄欲逺逺則有容而水不能溢累年事隄防者既無真土𩔖多卑薄巳非制矣且夾河束水窄狹尤甚是速之使決耳合無力監前弊凡隄必尋老土凡基必従髙厚又必繹賈讓不與争地之㫖倣河南逺隄之制除豐沛太黄隄原址遥逺仍舊加幇外徐邳一帶舊隄查有迫近去處量行展築月隄仍於兩崖相度地形最窪易以奪河者另築遥隄桃清一帶南崖多附髙岡但上自歸仁集以至朱連家墩古堤已壊相應修復下抵馬厰坡地形頗窪相應接築以成其勢北崖自古城至清河亦應創築遥隄壹道不必再議縷隄徒糜財力及查清江浦外河一帶至栁浦灣止為淮城北堤除掃灣單薄量行加幇外但原基短促防䕶未周仍自栁浦灣至髙嶺創行接築肆拾餘里以遏兩河之水盡趨於海自清江浦運河至淮安西門一帶舊隄相應再行幇厚勿致裏河之水走洩妨運如此則諸隄悉固全河可恃矣伏候聖裁一議復閘壩以防外河之衝查得先該平江伯陳瑄創開裏河仍恐外水内侵特建五閘設法甚嚴鎖鑰掌於漕巡啟閉屬之分司運畢即行封塞一應官民并回空船隻悉令車盤此在嘉靖初年尚爾循行故事制非弗善也奈何法久漸弛五閘巳廢其壹僅存肆閘亦且坍塌殆盡漫無啟閉是以黄淮二水悉由此倒灌致傷運道合無議復舊制將見存肆閘俱加修理嚴司啟閉俟貳月先後粮運過完即行封閉惟遇解貢船隻方許啟放仍行查復五壩以便官民船隻照舊車盤毋致曲徇使客致壊良規伏候聖裁一議剏建滚水壩以固隄岸照得黄河水濁固不可分然伏秋之間淫潦相仍勢必暴漲兩崖為隄所固水不能洩則奔潰之患有所不免今查得吕梁上洪之磨臍溝桃源之陵城清河之安娘城土性堅實合無各建滚水石壩壹座比隄稍卑貳叄尺濶叄拾餘丈萬壹水與隄平任其従壩滚出則歸漕者常盈而無淤塞之患出漕者得洩而無他潰之虞全河不分而隄自固矣伏候聖裁一議止濬海工程以免糜費照得海口為兩河歸宿之地委應深濶但查海口原身自清口至安東縣面濶貳叄里自安東歴雲梯關至海口面濶柒捌里至拾餘里深各叄肆丈不等止因去年旁決之後自桃清至西橋一帶淤塞尋復通流今雖未及原身拾分之壹而兩河之水全歸故道並流洗刷深廣必可復舊至云相𫝊海口横沙并東西二尖據土民季真等吐稱並未望見潮上之時海舟通行無滯潮退沙面之水尚深貳尺況横沙并東西二尖各去海口叄拾餘里豈能阻礙河流故臣等以為不必治亦不能治惟有塞決挽河沙隨水去治河即所以治海也别鑿壹渠與復濬草灣徒費錢粮無濟於事伏候聖裁一暫寝老黄河之議以仍利涉照得黄强淮弱毎毎逼淮東注故議者欲復老黄河故道冀使黄水稍避髙堰民墊可瘳斯亦得策但勘得原河柒拾餘里中間故道久棄無論有水無水之地詢之居民俱失其真無従下手一不便也且已棄故道欲行開復必須深廣與正河等乃可奪流今見存大河口窄狹不及桃清叄分之壹而三議鎮入口之處背灣徑直猶恐水未必趨二不便也又其中流如魚溝鐵線溝葉家口陰陽口等處地勢卑窪諸決之水漫流至此一望瀰茫築隄費鉅且恐難保叄不便也況今桃清遥隄議築則黄水自有容受崔鎮等決議塞則正河自日深廣髙家堰議築則淮水自能㑹黄清江浦等閘議啟閉新城北隄議行接築則淮安髙寳興鹽等處自無水患此河雖不必復可也伏候聖裁奉聖㫖工部看了来説條列河工事宜乞恩俯賜俞允以便經理疏為條列河工事宜乞恩俯賜俞允以便經理事該臣㑹同漕運巡撫右侍郎江一麟議得工役繁興料理冝預官夫蝟集調度須周若不先為申明未免臨事舛錯除兩河疏築之議另行具陳外所有一二事宜不得不上煩聖聴者敬列條欵擬議上請伏望敕下該部再加查議如果臣言不謬俯賜施行臣等不勝感幸計開一議支放照得鳩工聚材出納甚瑣收掌銷筭頭緒頗多稽覈不嚴必滋冐破臣與撫臣百責攸萃兼以閲視不常無暇躬親經理合無比照昔年邳工事例將請發銀兩俱解淮安府貯庫各工應給工食應買物料府佐等官開數赴各該分督司道官覈實給票赴兩淮巡鹽衙門覆覈掛號方許關支毎季終該府將票𩔖送巡鹽衙門比對號印數目相同發回附巻通候工完𩔖覈造冊奏繳如有奸弊按法追究庶臣等得以専心河工而錢粮亦易於清楚矣伏乞聖裁一議分督照得河工浩繁道里遥逺若非多官分理不免顧此失彼分工之後錢粮出入工程次第皆其首尾遇有陞調等項若聴其離任則本官所分之工又須另委補替文移往来便至逾月及到工所茫然無措何以望其竣事而底績也合無俯念河工重大如遇前項相應離任官員容臣等暫留完工稽其勤惰别其功罪請㫖處分方得離任庶人心専定覬覦不萌而事易責成矣伏乞聖裁一議責成照得州縣正官職専親民故民易驅而事易集也奈何相沿之弊視河患如秦越視管河官如贅疣即以分司部屬臨之蔑如也妨工僨事實由於此目今大工肇興諸務叢脞若非責成各掌印官鮮克有濟合無興工之後一應派撥夫役買辦物料俱以責之各掌印正官躬親料理仍選委賢能佐二管押夫役赴工不許將陰醫等官搪塞如有仍前玩愒派辦失宜以致夫役逃散物料稽遲該工司道官即時㕘呈以慿奏治事完之日仍與管理河工諸臣一體分别題請施行庶事權歸一人無推避而大工自易矣伏乞聖裁一議激勸照得各工委官除府佐縣正外其州縣佐二府衛首領及雜職陰醫義民等官或管領人夫或措辦樁埽或運取甎石或打造器具衆務紛紜如臂使指但各官出入泥淖櫛沐風雨艱辛畢萃殊可矜憫有功而薄其賞誤事獨重其罰此人心之所以懈弛而事功之所以隳墮也合無工完之後容臣等逐一精覈如有實心任事勞苦倍常者俯賜破格超擢中間間有劣陞王官等項准與改擢其陰醫等官原有部劄冠帶者厚加奨犒如係義民准照題給冠帶榮身仍與陰醫等官一體免其本等差徭庶人心争奮而百事易集矣伏乞聖裁一議優恤各工夫役計工者毎方給銀肆分計日者毎日給銀叄分而本籍本户幇貼安家銀兩有無聴従其便兹亦不為薄矣但貧民自食其力衝寒冐暑暴風露日艱苦萬状縦使稍従優厚亦不為過合無毎夫一名於工食之外再行量免丁石壹年容臣等出給印信票帖審編之時許令執票赴官告免州縣官抗違許其赴臣告治如此則恵足使民民忘其勞矣伏乞聖裁一議蠲免照得淮揚河患頻仍民遭昏墊稱最苦者如淮安所屬山陽清河桃源宿遷睢寜安東鹽城鳳陽所屬泗州揚州所屬興化寳應徐州所屬蕭縣十一州縣者一望沮洳寸草不長凋敝極矣適今大工興舉用夫頗多舎近取逺鄰封未免有詞而此中流移貧民亦賴做工得食少延殘喘應派夫役既不容巳應輸賦税復加責辦實為繁苦合無軫念災極民窮姑將前十一州縣本年見徵夏秋起運錢粮特蠲壹半行臣等掲示通知俾催科少緩人樂趨役伏乞聖裁一議改折照得大工肇興費用不貲帑蔵空虚既難捜括閭閻窮困又難加派臣等反覆思惟無可為處萬不得已輒有非分之請而非所敢必也職等竊聞太倉之粟可備捌玖年之食積愈久則粟易朽故官軍之情有不願本色而願折色者稍加變通未為不可合無暫將今嵗漕粮除淮北及河南山東照舊兑運外其淮南并浙江等省姑准改折照例正兑毎石連耗米輕齎折銀柒錢改兑毎石連耗米折銀陸錢即以伍錢給軍正兑尚餘銀貳錢改兑餘銀壹錢兑運停止官軍應得行月粮留發河工支用總計可得玖拾餘萬兩以運軍應得之數而濟國家大工之需在内帑無支發之煩在閭閻無徵派之苦在朝廷為不費之恵在河工免缺乏之虞而在工諸臣亦得悉心疏築可無顧此失彼之慮所謂兩利而俱全者也臣等非不知近該科臣建議奉有明例但錢粮浩繁時當詘乏舍此則惟有請發内帑耳故敢冐昧陳瀆伏望敕下該部再加查議如可允行河工幸甚臣等幸甚伏乞聖裁一議息浮言臣等竊惟治河固難知河不易故雖身歴其地猶苦於措注之乖舛而況於遥度乎但勞民動衆之事怨咨易興而往来絡繹之途議論易起至於將迎之間稍稍簡畧則以是為非變黒為白者亦不可謂其盡無也憂國計者以急於望成之心而偶聞必不可成之語何怪乎其形諸章牘也而不知當局者意氣因而銷沮官夫遂生觀望少為揺奪隳敗隨之勉强執持疎逖難達其苦有不可言者伏望皇上俯垂鑒照容臣等殫力驅馳悉心料理寛臣以叄年之期如有不效治臣以罪伏乞聖裁奉聖㫖工部知道兩河經畧巻一
