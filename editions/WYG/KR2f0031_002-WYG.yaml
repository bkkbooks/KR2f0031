body:
  text: 兩河經畧巻二明潘季馴撰勘估兩河工程乞賜早請錢糧以便興舉疏為勘估兩河工程乞賜早請錢糧以便興舉事據管理河道郎中佘毅中施天麟張譽管河兵備等道㕘政龔大器副使林紹張純章時鸞僉事朱東光水利道僉事楊化各㑹呈前事䝉臣并漕運巡撫右侍郎江一麟劄付備仰職等親歴各該地方逐一相度除河患源委疏治事宜先行具呈訖今將職等估計過各項工程合用錢糧分理官員派調夫數逐一㑹計明白及稱錢糧無處要得題請破格蠲發等因列欵呈詳到職案照先為前事巳該臣等㑹案劄行各該司道勘議過疏治兩河經畧縁由前来另本具題外又經催行逐細估筭工程去後今據前因該臣㑹同漕運巡撫右侍郎江一麟議得北自豐沛南抵爪儀蟺蜿壹千餘里中間應築應塞應建應復工程不遺尺寸當此極敞大壊之時欲為壹勞永逸之計若非重費豈能有成所據司道估勘銀兩官夫數目臣等復加筭覈委不可已伏望敕下該部再加查議題請速賜俞允行臣等遵照施行地方幸甚計開一議錢糧照得河工募夫計土論方者築隄方廣壹丈厚壹尺為肆工毎工給銀肆分計日者毎日給銀叄分傜夫日給銀壹分風雨量犒此歴年議工之成䂓也但土有逺近力有倍省工難處所量須加増以均苦樂至于合用料物樁草麻栁稍灰鐵之𩔖俱須查照時價難以律論但當嚴加稽查勿滋虚冐除徐沛碭山黄縷貳堤并徐邳睢靈宿遷兩岸幇堤剏築歸仁集堤桃清接築新堤髙家堰與淮口支河先共估銀貳拾貳萬肆千叄百叄拾貳兩叄錢捌分巳經工部題奉欽依動發南京戸兵貳部銀貳拾萬兩并留漕粮捌萬石除前工支用外約該剰銀壹萬伍千陸百陸拾柒兩陸錢貳分相應聴作後工支用今估計得崔鎮決口共長壹百捌拾丈中段水深壹丈貳尺兩頭深淺不等俱應築根濶貳拾丈頂濶拾丈計用人工樁草麻䓁料該銀壹萬兩黄浦決口先就上流斜築計長陸拾丈水深壹貳丈不等應築根濶貳拾丈頂濶拾丈計用工料銀陸千兩填塞原決長壹百陸拾丈該用工料銀肆千兩應展月堤自徐州𤣥黄貳舖計長捌百伍拾丈根濶伍丈頂濶壹丈肆尺髙壹丈貳尺毎丈計土叄拾捌方肆分共叄萬貳千陸百肆拾方計工壹拾叄萬伍百陸拾工該銀叄千玖百壹拾陸兩捌錢應築遥堤南岸自靈璧縣張字舖起至邳州果字舖止長玖拾捌里北岸自吕梁山空連築至邳州直河止長柒拾伍里桃源古城起至清河獾墩止長壹百貳拾里共長貳百玖拾叄里計伍萬貳千柒百肆拾丈應築根濶陸丈頂濶貳丈髙壹丈貳尺每丈計土肆拾捌方共貳百伍拾叄萬壹千伍百貳拾方計工壹千壹拾貳萬陸千捌拾工該銀肆拾萬伍千肆拾叄兩貳錢内查沙墊土難在邳睢各界約長貳拾里桃清各界約長貳拾伍里貳處計長捌千壹百丈該土叄拾捌萬捌千捌百方毎方量加貳工該加銀叄萬壹千壹百肆兩加樁草等料該銀捌百玖拾兩吕梁磨臍溝桃源陵城清河安娘城叄處各建滚水石壩壹座每座工料銀叄千兩共銀玖千兩淮城北堤自大王廟起至栁浦灣止肆拾伍里零長捌千貳百伍拾貳丈肆尺加幇根濶貳丈貳尺頂濶壹丈壹尺髙陸尺毎丈計土玖方玖分該土捌萬壹千陸百玖拾捌方捌分計工貳拾肆萬伍千玖拾陸工肆分該銀柒千叄百伍拾貳兩捌錢玖分陸釐又自栁浦灣起至髙嶺止肆拾餘里實長陸千肆百玖拾陸丈柒尺剏築根濶肆丈伍尺頂濶壹丈伍尺髙陸尺毎丈計土拾捌方該土壹拾壹萬陸千玖百肆拾方陸分計工肆拾陸萬柒千柒百陸拾貳工肆分但取土甚逺遍野虚沙有尋距伍里挖至丈餘者若一槩論方給銀恐難濟事共估銀叄萬叄千柒百壹拾兩伍錢伍分清江浦一帶運堤南岸自王卿家起至夀州厰止長貳千貳百貳拾丈北岸自月河口起至許嶺家止長捌百捌拾丈各加髙叄肆尺濶壹丈肆伍尺不等共計土貳萬貳千壹拾方計工陸萬陸千叄拾工該銀壹千玖百捌拾兩玖錢内北岸一帶缺口計用樁料該銀肆百捌拾陸兩修復通濟閘并塞天妃閘該用工料銀壹千兩修復板閘清江福興新荘等閘各加石陸柒層不等共該工料銀壹千肆百玖拾兩肆閘各開月河打壩截流該用銀伍百兩修復仁義等壩約用銀伍千兩寳應湖堤自陸淺起至瓦店止長叄拾里添石修補工料該銀捌萬玖千伍百柒拾兩沿堤設減水閘陸座毎座工價銀伍百兩共銀叄千兩下流應開支河如興化縣白駒丁溪貳場鹽城縣新河廟等處各應挑深濶丈尺不等共計夫工該銀貳萬伍千捌百柒拾陸兩揚州河自髙廟至揚子橋計長伍千捌百貳丈應挑深陸柒尺不等共計夫工該銀壹萬玖千肆百肆拾陸兩伍錢儀真縣自東關至石人頭止計長肆拾伍里量加疏濬該銀叄千伍百兩舊例管工員役各有廩粮府佐毎員日給廩粮銀壹錢貳分毎員各帶書辦壹名日給口粮銀肆分州縣佐貳首領等官毎員日給廩粮銀陸分省祭陰醫義民老人毎名日給口粮銀肆分約該銀貳千兩以上總括之數大約如此至於工程難易料價低昂裒多益寡截長補短容職等隨時通融計筭要在節縮不至虚糜而巳通共該銀陸拾陸萬肆千捌百陸拾陸兩捌錢肆分陸釐除前支剰銀壹萬伍千陸百陸拾柒兩陸錢貳分徭夫減省工食銀壹萬伍千兩揚州挑淺并白駒丁溪鹽場新河廟等處支河議動巡鹽衙門銀叄萬伍千捌百柒拾陸兩外尚該銀伍拾玖萬捌千叄百貳拾叄兩貳錢貳分陸釐職等查得河道嵗額錢粮山東南直𨽻原無餘積毎遇年例修築東那西補甚至縮手待敝以致因循誤事追悔莫及止有河南壹省見貯銀壹拾玖萬餘兩而彼中河工繁鉅如梁靖口黄陵崗孫家渡趙皮寨銅瓦廂等處築堤防決費用不貲剜肉補瘡勢難那借合無俯念大工緊急破格議處准照臣等所請改折將正額解京餘銀留工支用庶為不費之恵如有不可乞照都給事中劉鉉題請内帑支發通貯淮安府庫聴司道官查覈赴巡鹽御史處覆覈闗支伏候聖裁一議分督照得工程浩大道里遥逺若非多官分理畫地責成不免顧此失彼今議徐州北岸自吕梁洪至邳州直河止一帶遥堤柒拾里該海防道㕘政龔大器總管自桃源縣古城以下遥堤陸拾里并塞界内缺口及建陵城滚水壩壹座該淮北分司郎中佘毅中總管自桃源界至清河獾墩止遥堤陸拾里并塞界内決口及建安娘城滚水壩壹座該添註管河道副使張純總管自徐州南岸𤣥黄貳舖月堤并靈睢界内遥堤伍拾餘里及建磨臍溝滚水壩壹座該徐州道副使林紹總管自睢寜界内遥堤肆拾餘里并築歸仁集堤叄拾伍里該潁州道僉事朱東光總管修復淮安板閘至新荘閘共肆閘修築裏河兩堤并新城北一帶幇築新舊堤及塞黄浦口該水利道僉事楊化總管外興鹽支河先經該道呈允行各縣掌印官開挑仍應該道查催築髙家堰中段塞天妃閘朱家口開復通濟閘修築趙家口迤西堤岸修復仁義等伍壩該添註管河郎中張譽總管修築寳應一帶土石堤并建減水閘及挑濬揚州至儀真一帶河道該南河分司郎中施天麟總管以上司道捌員均分捌大工毎司道壹員分督府佐貳員計用府佐壹拾陸員毎府佐壹員分督州縣佐貳首領陰醫省祭官拾員共用壹百陸拾員聴臣等於所屬地方掄才調取如員數不足及各官間有經手要務妨占者容臣等於附近省分有司内查有幹濟素著者另行具奏調用分工之後大小官員俱要悉心經理總有應理公務止許工上幹辦不得擅離工次工完之日通將効勞官員分别等第及怠玩誤事者一并題請處分以昭勸懲伏候聖裁一議夫役照得前項工程一時並舉約用夫捌萬名内除量調各處傜夫柒千伍百名外今議派淮安府所屬募夫貳萬柒千伍百名揚廬鳳三府各募夫壹萬名徐州所屬募夫壹萬名滁和二州共募夫伍千名内有災傷及衝繁州縣聴該道官酌議減免應得工食照常支給仍行各該掌印官按籍派募如將無藉之徒應名塞責以致臨工逃散者容臣等指名㕘究伏乞聖裁奉聖㫖工部知道黄河来流艱阻後患可虞乞恩速賜查議以圗治安疏為黄河来流艱阻後患可虞乞恩速賜查議以圗治安事臣等猥以譾材謬膺重任晝夜思惟欲求萬全之䇿以報陛下㒺極之恩食不甘味寝不貼席者叄月矣而卒未能快於心也竊惟今之談河患者莫不曰徐邳河身墊髙水易溢也崔鎮諸口未塞桃清淺阻也髙堰黄浦淮水横流淮揚之民久為魚鼈也淮黄兩河之水漫無歸宿海口沙墊也此徐州迤南之患耳目之所覩記運道之所必資故人人得而言之也臣等巳於前月貳拾捌日㑹本具題陛下俯従臣請兩年之内或可脱淮揚昏墊之苦免運道梗阻之虞而臣等亦得藉以少逭愆尤矣然其大可憂者不在此也敢敬陳之臣等初抵淮安即詢黄河出接運道處所衆云出徐州小浮橋則臣等喜以為此黄河故道之最順者也又詢水深若干衆云深肆丈餘則臣等又喜以為此河身之本體也又詢小浮橋迤西則為胡佃溝為梁樓溝為北陳為鴈門集為石城集而石城集以上拾伍里則為崔家口即去嵗捌月所決之口也其間淺深俱不能答臣等即行淮安府管河同知王琰前往測度去後隨於肆月貳拾玖日親督淮北分司郎中佘毅中添註管河郎中張譽徐州管河兵備副使林紹添註管河副使張純沿河踏勘行至徐州隨據王琰掲報前項河水深柒捌尺至貳叄尺不等而梁樓溝至北陳叄拾里則止深壹尺陸柒寸散漫湖坡一望無際原係民間住址陸地非比沙淤可刷故河流逾年而淺阻如故也臣等不勝驚訝隨據徐州碭山鄉民段守金龔泮王霜等各呈稱老河故道自新集歴趙家圏蕭縣薊門出小浮橋壹向安流名曰銅幫鐵底後因河南水患另開壹道出小河口本河漸被沙淺至嘉靖叄拾柒年河遂北徙忽東忽西靡有定向行水河底即是陸地比之故道髙出叄丈有餘停阻泛濫妨運殃民懇乞開復老河上下永利等情臣等當督前司道并山東管河道副使邵元哲河南管河道副使唐汝迪由夏鎮歴豐沛至崔家口復自崔家口歴河南歸徳府之虞城夏邑商丘諸縣至新集閲視間則見黄河大勢已直趨潘家口矣隨據地方鄉老靳廷道等稟稱去此拾貳叄里自丁家道口以下貳百貳拾餘里舊河形迹見在儘可開復臣等即自潘家口歴丁家道口馬牧集韓家道口司家道口牛黄堌趙家圏至蕭縣一帶地方委有河形中間淤平者肆分之壹地勢髙亢南趨便利用錐鑚探河底俱係滂沙見水即可衝刷又據夏邑虞城等縣鄉官王極鄉民歐陽照等柒百餘人連名呈告俱為乞疏舊河便民事切照黄河故道自虞城迤下蕭縣迤上夏邑迤北碭山迤南嘉靖年間岸濶底深水勢安流既於運河無虞亦於民田無害商賈通行貿易大遂民稱豐庶自嘉靖叄拾陸年以後故道漸淤河隨北徙黄流泛溢青野汪洋居民拾不存壹運道屢年阻滯告乞早為開通上利下便是誠萬世盛舉等情臣等度其言實為探本之論但道里遼逺工費鉅艱復又沿河荒度更無省近可従者而臣等又冀崔家口一帶淺阻去處或可疏濬成河易為力也復督各官駕小舠至梁樓溝北陳等處躬親測量委果淺阻河底原係陸地委難衝刷蕭縣地方一望瀰漫民無粒食號訴之聲令人酸楚該縣城外環水為壑城中豬水為池居民逃徙官吏嬰城難守見今題請遷縣臣等竊思之壹縣之害此其小也夫黄河并合汴沁諸水萬里湍流勢若奔馬陡然遇淺形如檻限其性必怒奔潰決裂之禍臣等恐不在徐邳而在河南山東也止縁徐州以北非運道經行之所耳目之後人不見及止見其出自小浮橋而不考小浮橋之所自来遂以為無虞耳豈知水従上源決出運道必傷往年黄陵岡孫家渡趙皮寨之故轍可鑒乎臣等又查得新集故道河身深廣自元及我朝嘉靖年間行之甚利後壹變而為溜溝再變而為濁河又再變而為秦溝止因河身淺澁隨行隨徙然皆有丈餘之水未若今之逾尺也淺愈甚則變愈速臣等是以夙夜為懼也臣等又查得此河先年亦嘗建議開復止縁工費浩繁因而寝閣臣等竊料先時諸臣雖以工費為辭實非本心盖誠慮黄河之性叵測萬一開復之後復有他決罪將安辭目前既有壹河可通姑為茍安之計耳而不知臣子任君父之事惟當論可否不當論利害惟當計其功之必成不當慮其後之難必且所慮者他決也隨決隨塞亦非有甚難者故河變遷之後何處不溢何年不決寜獨不慮之乎臣等與司道諸臣計之故河之復其利有伍河従潘家口出小浮橋則新集迤東一帶河道俱為平陸曹單豐沛之民永無昏墊之苦壹利也河身深廣受水必多毎嵗可免泛溢之患虞夏豐沛之民得以安居樂業貳利也河従南行去㑹通河甚逺閘渠可保無虞叄利也来流既深建瓴之勢導滌自易則徐州以下河身亦必因而深刷肆利也小浮橋之来流既安則秦溝可免復衝而茶城永無淤塞之虞伍利也臣等以為復之便至於復故道難仍新衝易復故道勞仍新衝逸則臣等計之熟矣然舍難就易趨逸避勞慮日後未可必之身謀而不惜將来必致之大患皆非臣等之所以盡忠於陛下也臣等勘議之後即擬具題但因伏水將發猶望水勢洶湧或可衝刷成渠近又行據同知王琰回稱勘得北陳等處原深壹尺陸柒寸者今止深柒捌尺臣等看得伏秋暴漲之時水増陸尺有餘則客水消落之後不免仍存本體矣伏望敕下該部查議如果臣等所言不謬擬議上請特差素識水性科臣壹員前来候秋深水落與臣等㑹同山東河南撫臣及兼理河道巡鹽御史躬親勘議如果可復即便估計錢粮㑹本題請早賜施行地方幸甚臣等幸甚恭報河工大舉日期疏為恭報河工大舉日期事據管理河道郎中張譽等水利等道副使張純等呈稱抄䝉臣并漕撫侍郎江一麟㑹案劄行各官遵照題奉明㫖將各分督河工候水落興舉壹向鳩聚工料委調官夫俱有次第即今霜降在邇水勢漸消擇於玖月初拾日祭告本月拾伍日起土興工及将天妃閘塞口㫁流以便修築諸閘揚州打壩攔水以便挑濬淤淺仍乞掲示往来船隻暫行停止等因到臣案照先該臣等題為勘估兩河工程乞賜早請錢粮以便興舉事欵開一議分督看得河工浩大派為捌工定委總管司道官捌員督理該工部覆奉欽依備咨臣等通行欽遵間續因南河郎中施天麟奉㫖降調水利僉事楊化拏問遺下貳工缺官監督臣等議將施天麟所管寳應堤工改委營田道僉事史邦直揚州挑淺改委該府知府虞徳煜楊化所管清江浦兩岸築隄改委主事陳瑛増修新荘等肆閘改委淮安府知府宋伯華各管理栁浦灣一帶新隄并添寳應捌淺決工改委今補水利道副使張純黄浦口決工改委今補南河郎中張譽各兼理訖止有徐州兵備副使林紹原分壹工近該臣等題為河工大舉水旱頻仍謹循明例陳便宜以計安地方事議得本官河務欠諳力求解脱應合調處乞將真定副使游季勲加銜陞補勒限到任督管此工尚未奉㫖臣等一面督行徐州知州孫養魁靈璧縣知縣張允孚睢寜縣知縣徐密查照原分界址興築仍恭候成命至日施行其各工分委府佐及州縣正佐首領等官臣等遵奉明㫖先巳列名咨送吏部訖臣等向慮大役繁興料理宜預屢經嚴督整備相時肇舉去後今據前因看得霜降水消正宜及時工作相應依擬除批行遵照外再照河工囏鉅經理甚難國計民生關係匪細在工大小諸臣累奉明㫖申飭多方遴選靡不鼓舞奮勵期副廟堂責成之盛心矣興工之後益宜専心致志殫忠宣力務求堅久共成永利之澤仰舒我皇上南顧之憂如有因循墮誤以致半途之廢茍且塞責僅為目前之圗該工官員縦以别故去任容臣等指名追治必不敢姑息自干法紀今將興工日期及更置申飭縁由擬合奏報恭報兩河工程次第疏為恭報兩河工程次第事據原委督工司道等官郎中佘毅中㕘政龔大器游季勲副使張純僉事朱東光各呈稱原䝉本院分定應築黄河兩岸遥隄并淮城北栁浦灣等隄自本年玖月拾伍等日興工至今止築過工程中因取土難易工夫不齊總計丈尺大約已完拾分之叄應建減水壩叄座見在採辦石料捌淺已築西隄并挑濬月河通運東隄見在攔水興工又據郎中張譽呈報髙家堰未築中段隄岸共長叄千陸百陸拾丈内大澗湯恩等大小決口共長壹千陸拾丈今已築過壹千伍拾丈止餘拾丈未合偶阻風雪見今晝夜督併不日㫁流另報黄浦口水流巳緩俟髙堰㫁流之後自易築塞及稱方信貳壩工完見在車放回空粮船朱家口趙家口一帶隄決塞築已完通濟閘石止餘肆層見在催砌又據僉事史邦直呈稱寳應湖隄除填土工程已完拾分之叄應砌石工隄根無水處所見在甃砌有水者打壩掣水一面鑿石下樁等因又據佘毅中稟稱今嵗節奉牌行職等加嚴修守自邳州迤北并南岸一帶縷隄幸保無虞河水入漕止餘原報桃清上下大小決口自捌月拾陸日以来仰仗朝廷福庇百靈效順諸決自塞崔鎮大決口壹處原勘共長壹百捌拾丈近縁水歸故道日漸淤平止餘中段壹溝深坎處所積水叄肆尺不等原䝉本院諭令姑待髙堰㫁流之後再看水勢何如方行議築今本口淺涸乃在髙堰未築之前縦留無益莫若一體建築遥隄及查原議吕梁洪地名磨臍溝應築減水壩壹座今本處河渠深刷地形頗髙莫若將此壩移建崔鎮口以順趨下之勢又查得清河縣北伍拾餘里羅家口夏家口周家口新河口肆處向来分流灌口入海既非運艘經行之路亦無築隄妨礙似應姑留等因又據淮安府知府宋伯華申報督修福興等閘掣水砌石工完叄分之壹又據揚州府知府虞徳煜申報挑濬揚州運河自髙廟至楊子橋長伍千捌百貳丈外又増挑孟家溝長壹千捌百貳拾貳丈伍尺儀真縣運河自東關至石人頭長肆拾伍里俱於本年拾壹月初拾日工完申行水利道覈實開壩放水等因各報到臣案照先該臣等題為勘估兩河工程乞賜早請錢粮以便興舉事該工部覆奉欽依備咨臣等巳經通行司道府督令大小委官集夫辦料擇於玖月拾伍日開工具本題知訖今據前因該臣㑹同侍郎江一麟竊照治河之工築隄固難而塞決尤難今幸仰仗我皇上一誠黙運上格天心河伯效靈諸決自塞臣等原議欲挽旁決之水以歸正道今已悉従人願桃清而下昔如溝洫今皆洗刷深廣如故此雖郎中佘毅中修守之功不無少效勤勞然人力不至於此也及查雲梯闗海口大闢清口通利兩河順軌叄月之間河形頓改此自古迄今所無之事而臣等偶幸遭逢如此何敢貪天功為巳力哉止餘大澗口壹拾丈未合淮水尚分壹小支東奔若天氣晴和功在旬日不足慮也但黄水雖巳歸正而隄不築則明嵗伏秋必復泛溢故堅築遥隄以固其防剏築減水壩以殺其勢其工未可緩也髙堰之工㫁流雖已可期而一線未足為恃必俟㫁流之後隄内稑地乾出廣取其土加培髙厚方可無虞再查黄浦捌淺貳口皆因髙堰之水漫溢衝決髙堰既塞則貳口之築自易湖隄閘座亦當次第告成崔鎮決水委已歸漕併趨雲梯闗下海據稱留之無益應合一體建築遥隄復将磨臍溝減水壩移建本處姑留羅家等口以殺黄流似為允當工程次第此其大都矣再照築隄不難而取土為難或為水占或為沙掩逺搜深取務得膠淤老土方許填築夯杵並舉務求堅實臣等叄令伍申諸司道朝乾夕惕惟此而巳臣等猶慮官夫暗用飛沙填蔵隄内無従辨驗又製鐵探筒數拾具分散各工令其時時錐探臣等閲工之時亦將前器探試如筒内帶出浮沙揑不成顆即將本管官究治挖去改築真如燕雀壘巢日計分寸其工誠有不易者至於石工採運亦甚艱苦與其速而不堅孰若遲而可久故未可責效於旦夕也近因風雪大作地脈凍結難以興工日下暫擬陸續散夫先逺後近至明年正月貳拾日以前鳩工再舉伏望皇上少紓南顧之憂容臣等悉心料理務圗永賴之計必不敢茍且塞責以負任使縁係恭報兩河工程次第事理謹具題知奉聖㫖工部知道河患已除流民復業乞恩蠲租以廣招徕疏為河患已除流民復業乞恩蠲租以廣招徕事據徐州兵備兼管河道㕘政游季勲呈䝉臣批山陽縣被災流民陳漢等告為堰成復業乞憐困苦蠲豁粮差存恤事内稱向因髙堰衝決漢等大義安樂等鄉田地數萬頃盡沈水底民廬飄蕩只得逃竄他方傭身乞食今幸堰成地出逺近歡呼争来復業但恐安身未定遽徵粮差實難存濟告乞蠲恤以便開耕等情又䝉批桃源縣流民海其等清河縣流民鄭效等俱告為懇救殘命事内稱隆慶年間崔鎮等處口決節遭渰沒寸草不生民逃外方趂食延命今幸建築遥堤水由地中其等田土頓露漸次可耕即今賣船買牛覺有生路但汪􅐮蓁蕪一旦舉趾荷鋤不無多費牛種仍恐未獲有秋遽催新賦殘苦窮民實難復業如䝉蠲恤萬姓得生等情俱䝉批仰徐州道查議速詳該本道議照清河桃源濵臨黄河山陽壹縣適當淮黄之衝泗州接壤而鹽城寳應興化居其下流自隆慶以来河變異常沙淤淺阻黄決崔鎮等口而桃清長年渰沒淮決髙堰黄浦而泗州山陽鹽城寳應興化俱為巨澤小民無田可耕流移轉徙各色粮差逋負日積近䝉本院部堅持築塞天神黙相崔鎮等處決口盡歸故道河身深刷水有所受再築髙家堰下樁廂板實土堅固見加髙厚永保無虞自是淮㑹於黄循厓下海桃清山陽泗州田地皆可耕種髙堰既塞黄浦立成鹽城寳應興化田地旋見涸露拾數年昏墊之患幸巳消除黎庶𫝊聞歸復日衆正宜多方安挿以示招徕若再加以舊欠追呼新輸徵併巳歸者失望難存未歸者疑畏不至田地雖出亦復荒蕪合無請乞垂憐久災重地俯賜㑹題將前各州縣舊欠一應起存錢粮自萬厯陸年以前盡行蠲免萬厯柒年以後亦暫免徵俟安集既定耕種有成照舊一體徵派庶災民得業而子来河漕得民而永賴等因呈詳到臣據此案查先該臣等題為恭報兩河工程次第事巳将司道呈報過工程分數具本於去年拾壹月貳拾壹日題知天寒凍阻隨将官夫暫行掣放訖今於本年正月貳拾等日調集夫役照舊赴工臣因大澗一帶勢甚艱險添取徐州道㕘政游季勲水利道副使張純協同郎中張譽晝夜督理節據郎中佘毅中呈稱崔鎮自去冬淤塞止餘積水今巳厚築土壩内地乾涸僉事朱東光呈稱歸仁集隄決盡數堵塞隄南一帶頓復昔日田土之故流移亦多復業且津津事犂鋤矣郎中張譽呈稱髙堰塞決難在澗口去冬偶值氷雪竟難收功今䝉本院部親督官夫奮力負薪塞土頓挽全淮旋復故堰遂使數拾年之沮洳立成平陸數萬頃之膏腴盡還原業衆夫之畚挿有地三農之耕耨不妨見今密布柵樁中實板片即取乾出之土増髙加厚務保無虞等因各到臣通候工完具題間隨據各縣流民陳漢等擁衆填門各告前情巳經批行該道議詳去後今據前因該臣㑹同漕撫侍郎江一麟議照治水之道固以昏墊為先而治民之方尤以招徕為要自隆慶肆年以来黄水旁決於崔鎮張四冲等處淮水旁決於髙堰黄浦等處而淮揚之民魚鼈久矣今幸仰仗我皇上鋭意圗治獨㫁廟謨俾臣等得以勉竭犬馬之力以效胼胝之勞而司道諸臣大小各屬無不感奮自去嵗玖月拾伍日興工以来中間苦為氷雪所阻實止用工叄月各工大約及半而崔鎮髙堰歸仁集等處俱巳㫁流成陸見今加築髙厚可保無虞獨黄浦口伍拾餘丈見在興築然髙堰為黄浦上流髙堰既塞黄浦亦可計日淮黄貳河悉由故道並流入海了無漲溢中間或由天成或由人力要之皆仰仗皇上聖徳所感故天相其成人盡其力也臣等何能之有但地雖復矣而耕地之人不可無民雖歸矣而保民之政不可後倘佇足未定而催逋之吏已来開墾未成而増課之令即下則苛政之驅民又有甚於兩河旁決之水矣此災民之所以紛紛赴愬也職等欲俟大工通完之日方為題請但此時正當佈種之候恩詔未頒民心未定其孰肯虚費工力哉此臣等所以不得不早為陳乞也伏望皇上俯念久困之民特下蠲租之令即敕該部查議如果臣等所言不謬即行臣等轉行各該州縣備查原被黄淮貳水漂沒田産某州某處若干某縣某處若干自萬厯陸年以前拖欠錢粮若干悉行蠲免其萬厯柒年以後應徵額課再免貳年或叄年俟其開懇成熟方與追徵其極貧下户無力開墾者有司量為設處牛種以給之則民不改聚而萬姓咸自子来地不改闢而千里俱成沃壤矣縁係河患巳除流民復業乞恩蠲租以廣招徕事理謹題請㫖兩河經畧巻二
